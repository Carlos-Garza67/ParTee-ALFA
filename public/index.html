/* ═══ PLAYER ONBOARDING ═══ */
function PlayerOnboarding(){
  const{s,p,ref}=useA();
  const[nm,setNm]=useState(p?.full_name||"");const[city,setCity]=useState(p?.city||"");const[st,setSt]=useState(p?.state||"");
  const[ph,setPh]=useState(p?.phone||"");const[bd,setBd]=useState(p?.birth_date||"");const[hand,setHand]=useState(p?.handedness||"diestro");
  const[nick,setNick]=useState(p?.nickname||"");const[hc,setHc]=useState(p?.handicap?.toString()||"");
  const[msg,setMsg]=useState("");const[busy,setBusy]=useState(false);
  const save=async()=>{
    if(!nm.trim())return setMsg("Nombre es obligatorio");
    if(!city.trim())return setMsg("Ciudad es obligatoria");
    if(!st.trim())return setMsg("Estado es obligatorio");
    if(!ph.trim())return setMsg("Teléfono es obligatorio");
    if(!bd)return setMsg("Fecha de nacimiento es obligatoria");
    if(!hand)return setMsg("Selecciona mano dominante");
    const phoneRe=/^[\d\s\+\-\(\)]{7,20}$/;if(!phoneRe.test(ph))return setMsg("Formato de teléfono inválido");
    setBusy(true);setMsg("");
    const{error}=await sb.from("user_profiles").update({
      full_name:nm.trim(),city:city.trim(),state:st.trim(),phone:ph.trim(),
      birth_date:bd,handedness:hand,nickname:nick.trim()||null,
      handicap:hc?parseFloat(hc):null,onboarding_complete:true
    }).eq("id",s.user.id);
    if(error){setMsg(error.message);setBusy(false);return}
    await ref();setBusy(false)};
  const inpS={width:"100%",background:C.cd,border:"1px solid "+C.bd,borderRadius:10,padding:"12px 14px",fontSize:14,color:C.txt,outline:"none",boxSizing:"border-box"};
  return<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div className="fi" style={{width:"100%",maxWidth:420}}>
      <div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:40}}>&#9971;</div><h2 style={{color:C.txt,fontSize:22,fontWeight:800}}>¡Bienvenido a Partee!</h2><p style={{color:C.ts,fontSize:13,marginTop:6}}>Completa tu perfil para comenzar</p></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{gridColumn:"1/3"}}><label style={{fontSize:10,color:C.tm,fontWeight:600}}>NOMBRE Y APELLIDO *</label><input value={nm} onChange={x=>setNm(x.target.value)} placeholder="Nombre completo" style={{...inpS,marginTop:4}}/></div>
        <div><label style={{fontSize:10,color:C.tm,fontWeight:600}}>CIUDAD *</label><input value={city} onChange={x=>setCity(x.target.value)} placeholder="Ciudad" style={{...inpS,marginTop:4}}/></div>
        <div><label style={{fontSize:10,color:C.tm,fontWeight:600}}>ESTADO *</label><input value={st} onChange={x=>setSt(x.target.value)} placeholder="Estado" style={{...inpS,marginTop:4}}/></div>
        <div><label style={{fontSize:10,color:C.tm,fontWeight:600}}>TELÉFONO *</label><input value={ph} onChange={x=>setPh(x.target.value)} placeholder="+52 123 456 7890" style={{...inpS,marginTop:4}}/></div>
        <div><label style={{fontSize:10,color:C.tm,fontWeight:600}}>CORREO</label><input value={p?.email||""} disabled style={{...inpS,marginTop:4,opacity:.5}}/></div>
        <div><label style={{fontSize:10,color:C.tm,fontWeight:600}}>FECHA DE NACIMIENTO *</label><input type="date" value={bd} onChange={x=>setBd(x.target.value)} style={{...inpS,marginTop:4}}/></div>
        <div><label style={{fontSize:10,color:C.tm,fontWeight:600}}>MANO DOMINANTE *</label><div style={{display:"flex",gap:6,marginTop:4}}>{[{k:"diestro",l:"Diestro"},{k:"zurdo",l:"Zurdo"}].map(h=><button key={h.k} onClick={()=>setHand(h.k)} style={{flex:1,padding:10,borderRadius:10,border:"2px solid "+(hand===h.k?C.acc:C.bd),background:hand===h.k?C.acc+"15":"transparent",color:hand===h.k?C.acc:C.ts,fontSize:13,fontWeight:700,cursor:"pointer"}}>{h.l}</button>)}</div></div>
        <div><label style={{fontSize:10,color:C.tm,fontWeight:600}}>APODO <span style={{color:C.tm,fontWeight:400}}>(opcional)</span></label><input value={nick} onChange={x=>setNick(x.target.value)} placeholder="Apodo" style={{...inpS,marginTop:4}}/></div>
        <div><label style={{fontSize:10,color:C.tm,fontWeight:600}}>HANDICAP <span style={{color:C.tm,fontWeight:400}}>(opcional)</span></label><input value={hc} onChange={x=>setHc(x.target.value)} type="number" placeholder="0-54" style={{...inpS,marginTop:4}}/></div>
      </div>
      {msg&&<p style={{color:C.acc,fontSize:13,marginTop:10,textAlign:"center"}}>{msg}</p>}
      <button onClick={save} disabled={busy} style={{width:"100%",padding:16,marginTop:16,background:`linear-gradient(135deg,${C.acc},#ff6b6b)`,color:"#fff",border:"none",borderRadius:14,fontSize:16,fontWeight:700,cursor:"pointer",opacity:busy?.5:1}}>{busy?"Guardando...":"Comenzar"}</button>
    </div>
  </div>}

/* ═══ MAIN ═══ */
function Main(){const{s,p,ld}=useA();const{theme}=useTheme();const[tab,setTab]=useState(0);const[scr,setScr]=useState("home");const[co,setCo]=useState(null);const[sl,setSl]=useState(null);const[okd,setOkd]=useState(null);
  const[payResult,setPayResult]=useState(null);

    <h2 style={{fontSize:24,fontWeight:800,color:C.txt,marginBottom:8}}>{payResult==="success"?"¡Pago Exitoso!":payResult==="premium_success"?"¡Premium Activado!":"Pago Cancelado"}</h2>
    <p style={{fontSize:14,color:C.ts,marginBottom:24,maxWidth:300}}>{payResult==="success"?"Tu reserva está confirmada. Recibirás un correo de confirmación.":payResult==="premium_success"?"Ahora tienes acceso a todas las herramientas de inteligencia de mercado.":"El pago fue cancelado. Tu reserva queda pendiente."}</p>
    {payResult==="success"&&<div style={{display:"flex",gap:8,marginBottom:16}}><span style={{fontSize:28}}>⛳</span><span style={{fontSize:28}}>📧</span><span style={{fontSize:28}}>📅</span></div>}
    <button onClick={()=>setPayResult(null)} style={{padding:"14px 40px",background:`linear-gradient(135deg,${C.pri},#1a5276)`,color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>{payResult==="cancelled"?"Volver":"Continuar"}</button>
  </div>;
  if(ld)return<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><div className="pl" style={{color:C.ts}}>&#9971; Cargando...</div></div>;
  if(!s)return<Login/>;
  if(p?.is_deleted)return<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}><div style={{textAlign:"center"}}><h2 style={{color:C.txt}}>Cuenta eliminada</h2><p style={{color:C.ts,fontSize:13,marginTop:8}}>Esta cuenta ha sido desactivada.</p><button onClick={()=>sb.auth.signOut().then(()=>location.reload())} style={{marginTop:20,padding:"12px 30px",background:C.acc,border:"none",borderRadius:12,color:"#fff",fontWeight:700,cursor:"pointer"}}>Salir</button></div></div>;
  if(p?.user_role==="player"&&!p?.onboarding_complete)return<PlayerOnboarding/>;
  if(p?.user_role==="course_admin")return<AdminApp/>;
  const home=()=>{setScr("home");setCo(null);setSl(null);setTab(0)};
  const sc=theme==="dark"?"#fff":"#111827";
  const vsIcon="<svg width='20' height='20' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'><line x1='17' y1='3' x2='7' y2='18' stroke='"+sc+"' stroke-width='2' stroke-linecap='round'/><line x1='7' y1='18' x2='4' y2='16.5' stroke='"+sc+"' stroke-width='2.8' stroke-linecap='round'/><line x1='7' y1='3' x2='17' y2='18' stroke='"+sc+"' stroke-width='2' stroke-linecap='round'/><line x1='17' y1='18' x2='20' y2='16.5' stroke='"+sc+"' stroke-width='2.8' stroke-linecap='round'/><circle cx='17' cy='3' r='1.2' fill='"+sc+"'/><circle cx='7' cy='3' r='1.2' fill='"+sc+"'/></svg>";
  const ptabs=[{i:"&#128269;",l:"Explorar"},{i:"&#128197;",l:"Reservas"},{i:vsIcon,l:"Versus"},{i:"&#128101;",l:"Amigos"},{i:"&#128100;",l:"Perfil"}];
  return<div style={{maxWidth:430,margin:"0 auto",background:C.bg,minHeight:"100vh"}}>
    <div style={{background:theme==="light"?"#ffffff":`linear-gradient(135deg,${C.bg},${C.pri})`,padding:"13px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,borderBottom:"1px solid "+C.bd}}><div onClick={home} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:22}}>&#9971;</span><span style={{fontSize:20,fontWeight:800,color:theme==="light"?C.pri:"#fff"}}>Partee</span></div><div style={{display:"flex",alignItems:"center",gap:10}}><NotifBell/><span style={{width:7,height:7,borderRadius:4,background:C.grn,boxShadow:"0 0 6px "+C.grn}}/></div></div>

      {scr==="confirm"&&co&&sl&&<Confirm c={co} sl={sl} onBack={()=>setScr("detail")} onOk={d=>{setOkd(d);setScr("ok")}}/>}
      {scr==="ok"&&<Ok d={okd} onHome={home}/>}
    </div>
    {scr==="home"&&<div className="bnav">{ptabs.map((t,i)=><div key={i} onClick={()=>{setTab(i);setScr("home")}} style={{background:tab===i?"rgba(0,184,148,0.1)":"transparent",opacity:tab===i?1:.55}}><div style={{fontSize:18}} dangerouslySetInnerHTML={{__html:t.i}}/><div style={{fontSize:9,fontWeight:600,color:tab===i?C.grn:"#8a8f98",marginTop:2}}>{t.l}</div></div>)}</div>}
  </div>}

function App(){
  const[theme,setTheme]=useState(()=>{try{return localStorage.getItem("pt_theme")||"dark"}catch(e){return"dark"}});
  C=theme==="dark"?DARK:LIGHT;
  const toggle=()=>{const n=theme==="dark"?"light":"dark";setTheme(n);try{localStorage.setItem("pt_theme",n)}catch(e){}};

  return<ThemeCtx.Provider value={{theme,toggle}}><Auth><Main/></Auth></ThemeCtx.Provider>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

<script>

  var root = document.getElementById("root");
  var errHTML = function(msg){
    return '<div style="min-height:100vh;background:#0a0a1a;display:flex;align-items:center;justify-content:center;padding:24px"><div style="text-align:center;color:#fff;font-family:-apple-system,sans-serif;max-width:320px"><div style="font-size:48px;margin-bottom:16px">⛳</div><h2>Partee Golf</h2><p style="color:#a0aec0;margin-top:12px;font-size:14px">' + msg + '</p><button onclick="location.reload()" style="margin-top:20px;padding:12px 32px;background:#e94560;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer">Reintentar</button></div></div>';
  };
  // 1. Verify CDN dependencies
  var missing = [];
  if(typeof React === "undefined") missing.push("React");
  if(typeof ReactDOM === "undefined") missing.push("ReactDOM");
  if(typeof Babel === "undefined") missing.push("Babel");
  if(!window.supabase) missing.push("Supabase");
  if(missing.length > 0){ root.innerHTML = errHTML("Error al cargar: " + missing.join(", ")); return; }
  // 2. Feature-detect optional chaining support
  var needsEnv = false;
  try { new Function("return {}?.x")(); } catch(e) { needsEnv = true; }
  // 3. Safety timeout
  var loadTimer = setTimeout(function(){
    if(root && root.innerHTML.indexOf("Cargando") > -1){
      root.innerHTML = errHTML("Tiempo de carga excedido. Verifica tu conexión.");
    }
  }, 15000);
  // 4. Transform JSX
  try {
    var src = document.getElementById("jsx-source").textContent;
    var config = needsEnv
      ? { presets: [["env", { loose: true, modules: false }], "react"], sourceType: "script" }
      : { presets: ["react"], sourceType: "script" };
    var out = Babel.transform(src, config);
    clearTimeout(loadTimer);
    // 5. Execute using indirect eval (more reliable than appendChild on Safari)
    (1, eval)(out.code);
  } catch(e) {
    clearTimeout(loadTimer);
    console.error("Partee boot error:", e);
    root.innerHTML = errHTML(String(e.message || e).slice(0, 150));
  }
})();
</script>
