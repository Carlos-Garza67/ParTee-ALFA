input,textarea,select{max-width:100%;box-sizing:border-box}

/* Tables responsive */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;scrollbar-width:thin}
.scorecard-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;margin:0 -16px;padding:0 16px}

/* Select dark mode fix */
select,select option{background:var(--card-bg,#12121f);color:var(--txt,#f4f4f6)}
[data-theme="light"] select,[data-theme="light"] select option{background:#fff;color:#0f172a}

/* === UX POLISH === */
/* Stagger children fade-in */
.stagger>*{opacity:0;animation:fi .3s ease-out both}
.stagger>*:nth-child(1){animation-delay:0s}
.stagger>*:nth-child(2){animation-delay:.06s}
.stagger>*:nth-child(3){animation-delay:.12s}
.stagger>*:nth-child(4){animation-delay:.18s}
.stagger>*:nth-child(5){animation-delay:.24s}
.stagger>*:nth-child(6){animation-delay:.3s}
.stagger>*:nth-child(7){animation-delay:.36s}
.stagger>*:nth-child(8){animation-delay:.42s}

/* Press feedback for interactive cards */
.pressable{transition:transform .15s ease,box-shadow .15s ease;cursor:pointer}
.pressable:active{transform:scale(.97)!important;box-shadow:none!important}
.chip-f{font-size:12px;display:inline-flex;align-items:center;justify-content:center;gap:4px}
.chip-f svg{vertical-align:middle;flex-shrink:0}
@media(max-width:374px){.chip-f{font-size:10px}}
@media(min-width:375px) and (max-width:413px){.chip-f{font-size:11px}}

/* Smooth number counter */
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}

/* Empty state illustrations */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;animation:fi .4s ease-out}
.empty-icon{width:64px;height:64px;border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;position:relative}
.empty-icon::after{content:"";position:absolute;inset:-4px;border-radius:24px;background:inherit;opacity:.3;filter:blur(8px);z-index:-1}
.empty-title{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--txt)}
.empty-sub{font-size:12px;line-height:1.5;max-width:240px;color:var(--txt-s)}

/* Card glass with subtle gradient border */
.glass-hover{position:relative;overflow:hidden}
.glass-hover::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent)}

/* Badge earned animation */
.badge-earned{animation:badge-bounce .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes badge-bounce{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1) rotate(0)}}

/* Score input pulse on change */
.score-flash{animation:score-flash .3s ease}
@keyframes score-flash{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}

/* Smooth content swap */
.content-swap{animation:content-swap .2s ease}
@keyframes content-swap{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Touch targets */
@media (hover:none) and (pointer:coarse){
  button,[role="button"]{min-height:40px}
}

/* Reduced motion */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
}

function getCourseReadiness(course,slotsCount,holesCount){const ft=course?.facility_type||"campo";const photos=(course?.photo_urls||[]).length;const desc=(course?.description||"").trim();const checks=[{k:"photos",l:"Al menos 3 fotos",done:photos>=3,hint:photos+"/3"},{k:"description",l:"Descripción (mín 100 caracteres)",done:desc.length>=100,hint:desc.length+"/100"},{k:"fees",l:"Green fees (mín y máx)",done:!!(course?.green_fee_min&&course?.green_fee_max&&Number(course.green_fee_min)>0),hint:""},{k:"address",l:"Dirección completa",done:!!(course?.full_address||course?.address),hint:""},{k:"phone",l:"Teléfono de contacto",done:!!course?.phone_number,hint:""},{k:"hours",l:"Horario y días de operación",done:!!(course?.operating_hours&&course?.operating_days),hint:""},{k:"timezone",l:"Zona horaria",done:!!course?.timezone,hint:""},{k:"slots",l:"Al menos 3 slots publicados",done:(slotsCount||0)>=3,hint:(slotsCount||0)+"/3"}];if(ft==="campo")checks.push({k:"holes",l:"18 hoyos configurados",done:(holesCount||0)>=18,hint:(holesCount||0)+"/18"});if(ft==="plataforma")checks.push({k:"stations",l:"Número de bahías",done:!!(course?.stations_count&&Number(course.stations_count)>0),hint:""});if(ft==="simulador")checks.push({k:"cabins",l:"Cabinas y tecnología",done:!!(course?.cabins_count&&Number(course.cabins_count)>0&&course?.simulator_brand),hint:""});const doneCount=checks.filter(c=>c.done).length;return{checks,doneCount,total:checks.length,pct:Math.round(doneCount/checks.length*100),complete:doneCount===checks.length}}

function ToastProvider({children}){const[toasts,setToasts]=useState([]);const[cDialog,setCDialog]=useState(null);
  const toast=(msg,type="info")=>{const id=Date.now();setToasts(p=>[...p,{id,msg,type}]);setTimeout(()=>setToasts(p=>p.map(t=>t.id===id?{...t,out:true}:t)),2800);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3200)};
  const confirm=(msg,onYes,onNo)=>setCDialog({msg,onYes:()=>{setCDialog(null);onYes?.()},onNo:()=>{setCDialog(null);onNo?.()}});
  return<ToastCtx.Provider value={{toast,confirm}}>{children}
    <div className="toast-wrap">{toasts.map(t=><div key={t.id} className={"toast "+t.type+(t.out?" toast-out":"")}>
      <span>{t.type==="success"?"✓":t.type==="error"?"✕":t.type==="warn"?"⚠":"ℹ"}</span><span>{t.msg}</span>
    </div>)}</div>
    {cDialog&&<div className="confirm-overlay" onClick={cDialog.onNo}><div className="confirm-box" onClick={e=>e.stopPropagation()} style={{background:C.cd,border:"1px solid "+C.bd}}>
      <div dangerouslySetInnerHTML={{__html:ic("alert",28,C.acc)}} style={{marginBottom:12}}/>

    </div></div>}
  </ToastCtx.Provider>}

function useRating(courseId){const[avg,setAvg]=useState(0);const[cnt,setCnt]=useState(0);

function PullRefresh({onRefresh,children}){
  const[pulling,setPulling]=useState(false);const[refreshing,setRefreshing]=useState(false);
  const startY=useRef(0);const el=useRef(null);
  const onTouchStart=e=>{if(el.current?.scrollTop===0)startY.current=e.touches[0].clientY};
  const onTouchMove=e=>{if(!startY.current)return;const dy=e.touches[0].clientY-startY.current;if(dy>60&&el.current?.scrollTop===0)setPulling(true)};
  const onTouchEnd=async()=>{if(pulling&&!refreshing){setRefreshing(true);setPulling(false);await onRefresh?.();setRefreshing(false)}startY.current=0;setPulling(false)};
  return<div ref={el} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} style={{overflowY:"auto",flex:1}}>
    {(pulling||refreshing)&&<div className="ptr-indicator">{refreshing?<><div className="ptr-spin"/>Actualizando...</>:"↓ Suelta para actualizar"}</div>}
    {children}
  </div>}

const _cache={};
function cachedQuery(key,queryFn,ttlMs=30000){
  const now=Date.now();
  if(_cache[key]&&now-_cache[key].t<ttlMs)return Promise.resolve(_cache[key].d);
  return queryFn().then(r=>{_cache[key]={d:r,t:now};return r});
}

// === OFFLINE SCORING QUEUE ===
const _offlineQ={
  KEY:"partee_offline_scores",
  get(){try{return JSON.parse(localStorage.getItem(this.KEY)||"[]")}catch{return[]}},
  add(item){const q=this.get();q.push({...item,ts:Date.now()});localStorage.setItem(this.KEY,JSON.stringify(q));window.__offlineCount?.((window.__offlineCount?.()||0)+1);return q.length},
  clear(){localStorage.removeItem(this.KEY);window.__offlineCount?.(0)},
  remove(ts){const q=this.get().filter(x=>x.ts!==ts);localStorage.setItem(this.KEY,JSON.stringify(q));window.__offlineCount?.(q.length)},
  count(){return this.get().length}
};

async function syncOfflineScores(){
  const q=_offlineQ.get();
  if(!q.length)return 0;
  let synced=0;
  for(const item of q){
    try{
      await sb.from("tournament_scores").upsert({
        tournament_id:item.tournament_id,player_id:item.player_id,
        user_id:item.user_id,hole_number:item.hole_number,
        strokes:item.strokes,stableford_points:item.stableford_points
      },{onConflict:"tournament_id,player_id,hole_number"});
      await sb.from("tournament_players").update({
        total_score:item.total_score,total_vs_par:item.total_vs_par,
        holes_completed:item.holes_completed
      }).eq("id",item.player_id);
      _offlineQ.remove(item.ts);
      synced++;
    }catch(e){break}
  }
  if(synced>0)window.__toast?.("Sincronizados "+synced+" scores","success");
  return synced;
}

// Auto-sync when coming back online
if(typeof window!=="undefined"){
  window.addEventListener("online",()=>{
    window.__toast?.("Conexión restaurada","success");
    setTimeout(()=>syncOfflineScores(),1500);
  });
  window.addEventListener("offline",()=>{
    window.__toast?.("Sin conexión — scores se guardarán localmente","warn");
  });
}

function urlB64ToUint8(b64){const p="=".repeat((4-b64.length%4)%4);const b=(b64+p).replace(/-/g,"+").replace(/_/g,"/");const r=atob(b);return Uint8Array.from(r,c=>c.charCodeAt(0))}
async function initPush(userId){
  if(!("serviceWorker" in navigator)||!("PushManager" in window))return;
  try{
    const reg=await navigator.serviceWorker.register("/sw.js");
    const existing=await reg.pushManager.getSubscription();
    if(existing)return;
    const perm=await Notification.requestPermission();
    if(perm!=="granted")return;
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(VAPID_PUB)});
    const key=sub.getKey("p256dh");const auth=sub.getKey("auth");
    if(!key||!auth)return;
    const p256dh=btoa(String.fromCharCode(...new Uint8Array(key))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
    const authKey=btoa(String.fromCharCode(...new Uint8Array(auth))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
    await sb.from("push_subscriptions").upsert({user_id:userId,endpoint:sub.endpoint,p256dh,auth_key:authKey},{onConflict:"user_id,endpoint"});
  }catch(e){console.log("Push setup skipped:",e.message)}}

function getCourseCompleteness(course,counts){
  const items=[
    {k:"photos",l:"Mínimo 3 fotos",p:(counts.photos||0)>=3},
    {k:"desc",l:"Descripción (100+ caracteres)",p:(course.description||"").length>=100},
    {k:"fees",l:"Green fees (mín y máx)",p:Number(course.green_fee_min||0)>0&&Number(course.green_fee_max||0)>0},
    {k:"phone",l:"Teléfono de contacto",p:!!(course.phone_number&&String(course.phone_number).replace(/\D/g,"").length>=8)},
    {k:"hours",l:"Horario de operación",p:!!course.operating_hours},
    {k:"days",l:"Días de operación",p:!!course.operating_days},
    {k:"addr",l:"Dirección completa",p:!!(course.full_address||course.address)},
    {k:"slots",l:"3+ slots publicados (futuros)",p:(counts.slots||0)>=3}
  ];
  if(course.facility_type==="campo")items.push({k:"holes",l:"9+ hoyos configurados",p:(counts.holes||0)>=9});
  const pass=items.filter(i=>i.p).length;
  return{items,pass,total:items.length,pct:Math.round(pass/items.length*100),allDone:pass===items.length}
}

function AdminDash({course,onRefresh,navTo}){const[st,setSt]=useState(null);const[monthly,setMonthly]=useState([]);const[ld,setLd]=useState(true);const[csvRange,setCsvRange]=useState(false);const[csvFrom,setCsvFrom]=useState("");const[csvTo,setCsvTo]=useState(new Date().toISOString().slice(0,10));const[atRiskOpen,setAtRiskOpen]=useState(false);
  const ft=course.facility_type||"campo";const unitLabel=ft==="campo"?"Jugadores":ft==="plataforma"?"Visitantes":"Sesiones";const unitIcon=ft==="campo"?ic("golf",14,C.txt):ft==="plataforma"?ic("target",14,C.txt):ic("smartphone",14,C.txt);const capLabel=ft==="campo"?"Hoyos":ft==="plataforma"?"Bahías":"Cabinas";const capCount=ft==="campo"?(course.hole_count||18):ft==="plataforma"?(course.stations_count||0):(course.cabins_count||0);
  useEffect(()=>{Promise.all([
    sb.from("bookings").select("id,user_id,total_cost,booking_date,party_size,settlement_status,settlement_amount,settlement_date,user_profiles(full_name,nickname,email)").eq("course_id",course.id).eq("status","confirmed"),
    sb.from("time_slots").select("id,booked_count,capacity,slot_time,slot_date").eq("course_name",course.course_name),

    sb.from("tournaments").select("id,status,game_format").eq("course_id",course.id),
    sb.from("player_badges").select("id,badge_key,tournament_id")
  ]).then(([bk,sl,rv,tn,bg])=>{
    const allBk=bk.data||[];const allSl=sl.data||[];
    const rev=allBk.reduce((s,b)=>s+Number(b.total_cost||0),0);
    const pendSettle=allBk.filter(b=>b.settlement_status==="scheduled").reduce((s,b)=>s+Number(b.settlement_amount||0),0);
    const settledAmt=allBk.filter(b=>b.settlement_status==="settled").reduce((s,b)=>s+Number(b.settlement_amount||0),0);
    const cap=allSl.reduce((s,x)=>s+(x.capacity||0),0);
    const booked=allSl.reduce((s,x)=>s+(x.booked_count||0),0);
    const avg=(rv.data||[]).length?(rv.data.reduce((s,r)=>s+r.rating,0)/rv.data.length).toFixed(1):0;
    const today=new Date();const tdStr=today.toISOString().slice(0,10);
    // ===== Period comparisons (WoW + MoM) =====
    const dStr=(d)=>d.toISOString().slice(0,10);
    const day=86400000;const ws=new Date(today.getTime()-7*day);const wp=new Date(today.getTime()-14*day);
    const ms=new Date(today.getTime()-30*day);const mp=new Date(today.getTime()-60*day);
    const sumIn=(from,to)=>{const f=dStr(from);const t=dStr(to);const list=allBk.filter(b=>b.booking_date>=f&&b.booking_date<t);return{revenue:list.reduce((s,b)=>s+Number(b.total_cost||0),0),bookings:list.length,players:list.reduce((s,b)=>s+(b.party_size||0),0)}};
    const w0=sumIn(ws,today);const w1=sumIn(wp,ws);const m0=sumIn(ms,today);const m1=sumIn(mp,ms);
    const pctChg=(cur,prev)=>prev>0?Math.round((cur-prev)/prev*100):cur>0?100:0;
    const wow={cur:w0,prev:w1,revPct:pctChg(w0.revenue,w1.revenue),bksPct:pctChg(w0.bookings,w1.bookings)};
    const mom={cur:m0,prev:m1,revPct:pctChg(m0.revenue,m1.revenue),bksPct:pctChg(m0.bookings,m1.bookings)};
    // ===== Day-of-week heatmap (last 90d) =====
    const d90=new Date(today.getTime()-90*day);const d90s=dStr(d90);
    const dowTot=[0,0,0,0,0,0,0];const dowCap=[0,0,0,0,0,0,0];
    allSl.filter(s=>s.slot_date&&s.slot_date>=d90s&&s.slot_date<=tdStr).forEach(s=>{const d=new Date(s.slot_date+"T12:00:00").getDay();dowTot[d]+=s.booked_count||0;dowCap[d]+=s.capacity||0});
    const dowOcc=dowTot.map((b,i)=>dowCap[i]>0?Math.round(b/dowCap[i]*100):0);
    // ===== Time-of-day occupancy bands =====
    const bands={early:{l:"Early Bird (6-9h)",t:0,b:0},prime:{l:"Prime (9-12h)",t:0,b:0},mid:{l:t("Mediodía (12-15h)"),t:0,b:0},twi:{l:t("Twilight (15-18h)"),t:0,b:0}};
    allSl.forEach(s=>{const h=parseInt(s.slot_time?.split(":")[0]||"0");const k=h<9?"early":h<12?"prime":h<15?"mid":"twi";bands[k].t+=s.capacity||0;bands[k].b+=s.booked_count||0});
    const occBands=Object.values(bands).map(b=>({l:b.l,v:b.t>0?Math.round(b.b/b.t*100):0}));

function PerformanceScreen({onBack}){const{s,p}=useA();const[tab,setTab]=useState("resumen");

function PremiumInsights({course}){const{s}=useA();const{sub,isPremium}=usePremium();const[showPricing,setShowPricing]=useState(false);const[bench,setBench]=useState(null);const[mySt,setMySt]=useState(null);const[ld,setLd]=useState(true);
  useEffect(()=>{loadData()},[]);
  async function loadData(){const[bkR,slR,bmR]=await Promise.all([sb.from("bookings").select("id,total_cost,booking_date,booking_time,party_size").eq("course_id",course.id).eq("status","confirmed"),sb.from("time_slots").select("id,slot_time,slot_date,status,price,booked_count,capacity,course_id").eq("course_name",course.course_name),sb.from("market_benchmarks").select("*")]);
    const bks=bkR.data||[];const slots=slR.data||[];const benchmarks=bmR.data||[];const rev=bks.reduce((s,b)=>s+Number(b.total_cost||0),0);const avgTicket=bks.length?Math.round(rev/bks.length):0;const cap=slots.reduce((s,x)=>s+(x.capacity||0),0);const booked=slots.reduce((s,x)=>s+(x.booked_count||0),0);const occ=cap?Math.round(booked/cap*100):0;
    const byHour={};slots.forEach(sl=>{const h=parseInt(sl.slot_time?.split(":")[0]||"0");if(!byHour[h])byHour[h]={t:0,b:0,rev:0};byHour[h].t+=sl.capacity||0;byHour[h].b+=sl.booked_count||0});bks.forEach(b=>{const h=parseInt(b.booking_time?.split(":")[0]||"0");if(byHour[h])byHour[h].rev+=Number(b.total_cost||0)});
    const hourData=Object.entries(byHour).map(([h,d])=>({hour:parseInt(h),occ:d.t?Math.round(d.b/d.t*100):0,rev:d.rev})).sort((a,b)=>a.hour-b.hour);
    const myBench=benchmarks.find(b=>b.course_type===course.course_type&&b.facility_type===(course.facility_type||"campo"))||benchmarks[0];
    setBench(myBench);setMySt({rev,avgTicket,occ,bks:bks.length,hourData,feeMin:course.green_fee_min,feeMax:course.green_fee_max});setLd(false)}
  async function activatePlan(plan,promo){const price=promo&&promo.discount_type==="free"?0:PLANS[plan].price;if(price===0){const exp=new Date();plan==="annual"?exp.setFullYear(exp.getFullYear()+1):exp.setMonth(exp.getMonth()+1);await sb.from("admin_subscriptions").upsert({user_id:s.user.id,plan,status:"active",price_mxn:0,started_at:new Date().toISOString(),expires_at:exp.toISOString()},{onConflict:"user_id"});await sb.from("user_profiles").update({subscription_plan:plan}).eq("id",s.user.id);if(promo)await redeemPromo(promo.id,s.user.id,"premium",null,PLANS[plan].price);setShowPricing(false);location.reload();return}const sr=await stripeCheckout({type:"premium",plan,user_email:s.user.email});if(sr.error)window.__toast?.(sr.error,"error");setShowPricing(false)}
  if(ld)return<Skeleton w="100%" h={50}/>;const m=mySt;const b=bench;const mktOcc=b&&(b.booked_slots_7d+b.available_slots_7d)>0?Math.round(b.booked_slots_7d/(b.booked_slots_7d+b.available_slots_7d)*100):0;
  return<div className="fi">
    {showPricing&&<PricingModal onClose={()=>setShowPricing(false)} onSelect={activatePlan} userId={s?.user?.id}/>}
    {!isPremium&&<div style={{background:`linear-gradient(135deg,${C.pri}15,${C.acc}15)`,border:"1px solid "+C.pri+"30",borderRadius:14,padding:20,marginBottom:16,textAlign:"center"}}><div dangerouslySetInnerHTML={{__html:ic("gem",28,C.gld)}}/><div style={{fontSize:18,fontWeight:800,color:C.txt,marginTop:6}}>{t("Premium")}</div><div style={{fontSize:12,color:C.ts,marginTop:4}}>Inteligencia de mercado por $100/mes</div><button onClick={()=>setShowPricing(true)} style={{marginTop:12,padding:"12px 24px",background:"linear-gradient(135deg,#f59e0b,#d97706)",border:"none",borderRadius:10,color:"#fff",fontWeight:700,cursor:"pointer"}} dangerouslySetInnerHTML={{__html:ic("gem",13,"#fff")+" Adquirir"}}></button></div>}
    {isPremium?<div style={{background:"linear-gradient(135deg,#f59e0b20,#d9770620)",border:"1px solid #f59e0b40",borderRadius:14,padding:12,marginBottom:16,display:"flex",alignItems:"center",gap:10}}><span dangerouslySetInnerHTML={{__html:ic("gem",20,C.gld)}}/><div><div style={{fontSize:13,fontWeight:700,color:C.txt}}>Premium Activo<PremiumBadge plan={sub?.plan}/></div></div></div>:null}
    <h4 style={{fontSize:13,fontWeight:700,color:C.txt,marginBottom:10}}>Comparativa</h4>
    {isPremium&&b?<div style={{marginBottom:16}}>{[{l:"Ocupación",my:m.occ+"%",mkt:mktOcc+"%",good:m.occ>=mktOcc},{l:"Ticket",my:"$"+fm(m.avgTicket),mkt:"$"+fm(b.avg_ticket||0),good:m.avgTicket>=(b.avg_ticket||0)},{l:"Reservas",my:m.bks+"",mkt:Math.round((b.bookings_last_30d||0)/Math.max(b.venue_count,1))+"",good:true}].map((r,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8,background:C.cd,borderRadius:10,padding:10,border:"1px solid "+C.bd}}><div style={{fontSize:11,color:C.ts}}>{r.l}</div><div style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:800,color:r.good?C.grn:C.acc}}>{r.my}</div><div style={{fontSize:9,color:C.tm}}>{t("Tu campo")}</div></div><div style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:700,color:C.ts}}>{r.mkt}</div><div style={{fontSize:9,color:C.tm}}>Mercado</div></div></div>)}</div>:<LockedOverlay title="Comparativa" desc="vs otros campos de tu categoría" onUpgrade={()=>setShowPricing(true)}/>}
    <h4 style={{fontSize:13,fontWeight:700,color:C.txt,marginBottom:10}} dangerouslySetInnerHTML={{__html:ic("lightbulb",14,C.txt)+" Inteligencia"}}></h4>
    {isPremium?<div style={{marginBottom:16}}>{(()=>{const recs=[];if(m.occ<40)recs.push({icon:ic("star",18,C.gld),title:"Lanza promo Early Bird",desc:"Ocupación baja ("+m.occ+"%). Promo 6-9am puede +20%."});if(!course.has_food_service)recs.push({icon:ic("utensils",18,C.grn),title:"Agrega comida",desc:"+35% ingreso por visita."});recs.push({icon:ic("trophy",18,C.gld),title:t("Organiza partidas"),desc:"+40% retención."});return recs.map((r,i)=><div key={i} style={{background:C.cd,border:"1px solid "+C.bd,borderRadius:14,padding:12,marginBottom:8,display:"flex",gap:10}}><span style={{fontSize:22,flexShrink:0}} dangerouslySetInnerHTML={{__html:r.icon}}/><div><div style={{fontSize:13,fontWeight:700,color:C.txt}}>{r.title}</div><div style={{fontSize:11,color:C.ts,marginTop:2}}>{r.desc}</div></div></div>)})()}</div>:<LockedOverlay title="Inteligencia Comercial" desc="Recomendaciones basadas en datos" onUpgrade={()=>setShowPricing(true)}/>}
    <h4 style={{fontSize:13,fontWeight:700,color:C.txt,marginBottom:10}} dangerouslySetInnerHTML={{__html:ic("dollar",14,C.txt)+" Pricing"}}></h4>
    {isPremium?<div style={{marginBottom:16}}>{(()=>{const suggestions=[];(m.hourData||[]).forEach(h=>{if(h.occ>80)suggestions.push({hour:h.hour,type:"increase",pct:15,reason:"Alta demanda ("+h.occ+"%)"});else if(h.occ<20&&h.hour>=6)suggestions.push({hour:h.hour,type:"decrease",pct:20,reason:"Baja demanda ("+h.occ+"%)"})});return<>{suggestions.length>0&&<div style={{background:C.cd,border:"1px solid "+C.bd,borderRadius:14,padding:14,marginBottom:10}}>{suggestions.slice(0,5).map((sg,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:8,background:sg.type==="increase"?C.grn+"10":C.acc+"10",borderRadius:10}}><div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:sg.type==="increase"?C.grn:C.acc}}>{sg.hour}:00 — {sg.type==="increase"?"Subir":"Bajar"} {sg.pct}%</div><div style={{fontSize:10,color:C.ts}}>{sg.reason}</div></div></div>)}</div>}</>})()}</div>:<LockedOverlay title="Pricing Dinámico" desc="Ajusta precios por demanda" onUpgrade={()=>setShowPricing(true)}/>}
  </div>}

function AdminSlots({course}){const[slots,setSlots]=useState([]);const[ld,setLd]=useState(true);const[selDate,setSelDate]=useState(new Date().toISOString().split("T")[0]);const[gen,setGen]=useState(false);const[editSlot,setEditSlot]=useState(null);const[editPrice,setEditPrice]=useState("");

  async function load(){setLd(true);const{data}=await sb.from("time_slots").select("*").eq("course_name",course.course_name).eq("slot_date",selDate).order("slot_time");setSlots(data||[]);setLd(false)}
  async function deleteSlot(id){const go=async()=>{await sb.from("time_slots").delete().eq("id",id);loadData();window.__toast?.("Slot eliminado","success")};if(window.__confirm)window.__confirm("¿Eliminar este slot?",go);else go()}
  const navDay=(d)=>{const dt=new Date(selDate+"T12:00:00");dt.setDate(dt.getDate()+d);setSelDate(dt.toISOString().split("T")[0])};
  const dayLabel=(d)=>{const dt=new Date(d+"T12:00:00");return DN[dt.getDay()]+" "+dt.getDate()+" "+dt.toLocaleDateString("es-MX",{month:"short"})};
  const today=new Date().toISOString().split("T")[0];
  const toggleSlot=async(sl)=>{const ns=sl.status==="available"?"blocked":"available";await sb.from("time_slots").update({status:ns}).eq("id",sl.id);load()};
  const savePrice=async()=>{if(!editSlot||!editPrice)return;await sb.from("time_slots").update({price:parseFloat(editPrice)}).eq("id",editSlot.id);setEditSlot(null);load()};
  const generateSlots=async()=>{setGen(true);try{await fetch(SB_FN_URL+"/slot-manager",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});if(window.__toast)window.__toast("Slots generados","success");load()}catch(e){if(window.__toast)window.__toast("Error: "+e.message,"error")}setGen(false)};
  const toggleOffer=async(sl)=>{await sb.from("time_slots").update({is_offer:!sl.is_offer}).eq("id",sl.id);load()};
  const available=slots.filter(s=>s.status==="available");const blocked=slots.filter(s=>s.status==="blocked");const booked=slots.filter(s=>s.status==="booked");
  const bands=[{k:"early",l:"Early Bird (6-9h)",r:[0,9]},{k:"prime",l:"Prime (9-12h)",r:[9,12]},{k:"mid",l:"Mediodía (12-15h)",r:[12,15]},{k:"twi",l:"Twilight (15+)",r:[15,24]}];
  return<div className="fi">

    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}><button onClick={()=>navDay(-1)} style={{width:36,height:36,borderRadius:20,border:"1px solid "+C.bd,background:C.cd,color:C.txt,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} dangerouslySetInnerHTML={{__html:ic("left",14,C.txt)}}/><div style={{textAlign:"center"}}><div style={{fontSize:15,fontWeight:800,color:C.txt,textTransform:"capitalize"}}>{dayLabel(selDate)}</div>{selDate===today&&<div style={{fontSize:10,color:C.acc,fontWeight:600}}>HOY</div>}<input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{marginTop:4,background:"transparent",border:"none",color:C.tm,fontSize:11,textAlign:"center"}}/></div><button onClick={()=>navDay(1)} style={{width:36,height:36,borderRadius:20,border:"1px solid "+C.bd,background:C.cd,color:C.txt,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} dangerouslySetInnerHTML={{__html:ic("right",14,C.tm)}}/></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}><div className="sc"><div className="n" style={{color:C.grn,fontSize:18}}>{available.length}</div><div className="l">Disponibles</div></div><div className="sc"><div className="n" style={{color:C.acc,fontSize:18}}>{booked.length}</div><div className="l">{t("Reservados")}</div></div><div className="sc"><div className="n" style={{color:C.tm,fontSize:18}}>{blocked.length}</div><div className="l">Bloqueados</div></div></div>
    {ld?<Skeleton w="100%" h={60}/>:slots.length===0?<div style={{textAlign:"center",padding:30,color:C.tm}}><div dangerouslySetInnerHTML={{__html:ic("calendar",28,C.tm)}} style={{marginBottom:8}}/><p>Sin slots para esta fecha</p><p style={{fontSize:12,marginTop:4}}>Click "Generar 30 días" para crear</p></div>:
    bands.map(band=>{const bs=slots.filter(x=>{const h=parseInt(x.slot_time);return h>=band.r[0]&&h<band.r[1]});if(!bs.length)return null;return<div key={band.k} style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:700,color:C.ts,marginBottom:6}}>{band.l} ({bs.length})</div>{bs.map(sl=><div key={sl.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:sl.status==="booked"?C.acc+"10":sl.status==="blocked"?C.tm+"15":C.cd,borderRadius:10,border:"1px solid "+(sl.status==="booked"?C.acc+"30":sl.is_offer?C.gld+"40":C.bd),marginBottom:4}}>

      </div>
    </div>)}</div>})}
    {editSlot&&<div className="modal-bg" onClick={()=>setEditSlot(null)}><div className="modal-box" onClick={e=>e.stopPropagation()} style={{background:C.cd,border:"1px solid "+C.bd}}><h3 style={{color:C.txt,fontSize:18,fontWeight:700,marginBottom:14}}>Editar Slot {editSlot.slot_time?.slice(0,5)}</h3>
      <label style={{fontSize:10,color:C.tm}}>{t("PRECIO (MXN)")}</label><input value={editPrice} onChange={e=>setEditPrice(e.target.value)} type="number" style={{...inp0,marginTop:4,marginBottom:14,color:C.txt}}/>
      <div style={{display:"flex",gap:8}}><button onClick={savePrice} style={{flex:1,padding:12,background:`linear-gradient(135deg,${C.grn},#00cec9)`,border:"none",borderRadius:10,color:"#fff",fontWeight:700,cursor:"pointer"}}>{t("Guardar")}</button><button onClick={()=>setEditSlot(null)} style={{padding:"12px 18px",background:"transparent",border:"1px solid "+C.bd,borderRadius:10,color:C.ts,cursor:"pointer"}}>{t("Cancelar")}</button></div>
    </div></div>}
    {selDate!==today&&<button onClick={()=>setSelDate(today)} style={{width:"100%",padding:10,marginTop:10,background:"transparent",border:"1px solid "+C.bd,borderRadius:10,color:C.acc,fontSize:13,fontWeight:600,cursor:"pointer"}}>Ir a hoy</button>}
  </div>}

  const loadAll=async()=>{setLd(true);const today=new Date().toISOString().slice(0,10);const d30=new Date(Date.now()-30*86400000).toISOString().slice(0,10);

    const slotsByCourse={};allS.forEach(s=>{slotsByCourse[s.course_name]=(slotsByCourse[s.course_name]||0)+1});

    const inactive=enriched.filter(c=>(c.listing_status||"draft")==="active"&&c._rev30===0&&c._slots===0);

    const activeAdmins=allU.filter(u=>!u.is_deleted&&u.user_role==="course_admin").length;
    setStats({byStatus,platformRev,platformFee,topRev,inactive,pendingN,activePlayers,activeAdmins,totalCourses:allC.length});
    setCourses(enriched);setLd(false)
  };

  const filtered=courses.filter(c=>{if(filter!=="all"&&(c.listing_status||"draft")!==filter)return false;if(search){const q=search.toLowerCase();if(!c.course_name?.toLowerCase().includes(q)&&!c.city?.toLowerCase().includes(q))return false}return true});
  const STAT_CFG={draft:{l:"Borrador",c:C.acc},pending_review:{l:"Pendiente",c:C.gld},active:{l:"Activo",c:C.grn},suspended:{l:"Suspendido",c:C.acc}};
  const tabs=[{i:ic("chart",20,C.txt),l:"Overview"},{i:ic("golf",20,C.txt),l:"Campos"},{i:ic("user",20,C.txt),l:"Perfil"}];
  if(ld)return<div style={{minHeight:"100dvh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><div className="pl" style={{color:C.ts}}>Cargando...</div></div>;
  return<div className="admin-container" style={{background:C.bg}}>
    <div className="admin-header" style={{background:C.bg,padding:"10px 20px",position:"sticky",top:0,zIndex:100,borderBottom:"1px solid "+C.bd,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}><ParteeMark size={24} color={C.acc}/><div><div style={{fontSize:12,color:C.ts,fontWeight:700}}>Partee Platform</div></div></div>
      <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{padding:"3px 9px",borderRadius:7,background:C.acc+"15",border:"1px solid "+C.acc+"35"}}><span style={{fontSize:9,fontWeight:700,color:C.acc,letterSpacing:".05em"}}>PLATFORM</span></div><NotifBell/></div>
    </div>
    <div className="admin-content" style={{padding:16,paddingBottom:70}}>
      {tab===0&&<div className="fi">
        <h3 style={{fontSize:16,fontWeight:800,color:C.txt,marginBottom:14,letterSpacing:"-0.02em"}}>Overview de Plataforma</h3>
        {stats.pendingN>0&&<div onClick={()=>{setFilter("pending_review");setTab(1)}} style={{background:C.gld+"15",border:"1px solid "+C.gld+"35",borderRadius:14,padding:14,marginBottom:16,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:C.gld+"25",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}} dangerouslySetInnerHTML={{__html:ic("clock",18,C.gld)}}/>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:800,color:C.gld}}>{stats.pendingN} campo{stats.pendingN===1?"":"s"} esperando revisión</div><div style={{fontSize:11,color:C.ts,marginTop:2}}>Toca para revisar y aprobar</div></div>
          <span dangerouslySetInnerHTML={{__html:ic("right",16,C.gld)}}/>
        </div>}
        <div style={{..._s.grid2lg,marginBottom:16}}>
          <div className="sc"><div className="n" style={{color:C.grn}}>${fm(stats.platformRev)}</div><div className="l">GMV total</div></div>
          <div className="sc"><div className="n" style={{color:C.gld}}>${fm(Math.round(stats.platformFee))}</div><div className="l">Fee plataforma</div></div>
        </div>
        <h4 style={{fontSize:13,fontWeight:800,color:C.txt,marginBottom:10}}>Campos por estado</h4>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          {Object.entries(stats.byStatus).map(([k,v])=>{const cfg=STAT_CFG[k];return<div key={k} onClick={()=>{setFilter(k);setTab(1)}} className="sc" style={{cursor:"pointer",border:"1px solid "+cfg.c+"30"}}><div className="n" style={{color:cfg.c}}>{v}</div><div className="l">{cfg.l}</div></div>})}
        </div>
        <div style={{..._s.grid2lg,marginBottom:16}}>
          <div className="sc"><div className="n" style={{color:C.grn}}>{stats.activePlayers}</div><div className="l">Jugadores</div></div>
          <div className="sc"><div className="n" style={{color:C.acc}}>{stats.activeAdmins}</div><div className="l">Admins de campo</div></div>
        </div>
        {stats.topRev.length>0&&<><h4 style={{fontSize:13,fontWeight:800,color:C.txt,marginBottom:10}}>Top 5 — últimos 30 días</h4>
        <div style={{marginBottom:16}}>{stats.topRev.map((c,i)=><div key={c.id} onClick={()=>setSel(c)} className="ar" style={{cursor:"pointer",marginBottom:6}}><div style={{width:28,height:28,borderRadius:10,background:C.grn+"15",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:C.grn,fontSize:13}}>{i+1}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:C.txt,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.course_name}</div><div style={{fontSize:11,color:C.ts}}>{c.city}, {c.state}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:800,color:C.grn,..._s.mono}}>${fm(c._rev30)}</div></div></div>)}</div></>}
        {stats.inactive.length>0&&<><h4 style={{fontSize:13,fontWeight:800,color:C.txt,marginBottom:10}}>Activos sin movimiento ({stats.inactive.length})</h4>
        <div style={{fontSize:11,color:C.ts,marginBottom:10}}>Publicados pero sin reservas ni slots futuros</div>
        <div style={{marginBottom:16}}>{stats.inactive.slice(0,10).map(c=><div key={c.id} onClick={()=>setSel(c)} className="ar" style={{cursor:"pointer",marginBottom:6,border:"1px solid "+C.acc+"20"}}><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:C.txt,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.course_name}</div><div style={{fontSize:11,color:C.ts}}>{c.city}, {c.state}</div></div><span dangerouslySetInnerHTML={{__html:ic("right",14,C.tm)}}/></div>)}</div></>}
      </div>}
      {tab===1&&<div className="fi">
        <h3 style={{fontSize:16,fontWeight:800,color:C.txt,marginBottom:12}}>Campos ({filtered.length})</h3>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nombre o ciudad..." style={{...inp0,marginBottom:10}}/>
        <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto"}}>
          {[["all","Todos"],["pending_review","Pendientes"],["draft","Borrador"],["active","Activos"],["suspended","Suspendidos"]].map(([k,l])=><button key={k} onClick={()=>setFilter(k)} style={{padding:"7px 14px",borderRadius:10,border:"1px solid "+(filter===k?C.acc:C.bd),background:filter===k?C.acc+"15":"transparent",color:filter===k?C.acc:C.ts,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{l}</button>)}
        </div>
        {filtered.length===0?<div style={{textAlign:"center",padding:40,color:C.tm,fontSize:13}}>Sin resultados</div>:

          {photo?<img src={photo} style={{width:48,height:48,borderRadius:12,objectFit:"cover",flexShrink:0}}/>:<div style={{width:48,height:48,borderRadius:12,background:C.cd,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}} dangerouslySetInnerHTML={{__html:ic("golf",22,C.tm)}}/>}

function PlatformCourseDetail({course,onClose,onRefresh,adminId}){const[counts,setCounts]=useState({photos:(course.photo_urls||[]).length,slots:0,holes:0});const[action,setAction]=useState(null);const[reason,setReason]=useState("");const[busy,setBusy]=useState(false);const[owner,setOwner]=useState(null);
  useEffect(()=>{const today=new Date().toISOString().slice(0,10);
    Promise.all([
      sb.from("time_slots").select("id",{count:"exact",head:true}).eq("course_name",course.course_name).gte("slot_date",today),
      course.facility_type==="campo"?sb.from("course_holes").select("id",{count:"exact",head:true}).eq("course_id",course.id):Promise.resolve({count:0}),
      sb.from("user_profiles").select("full_name,email,phone").eq("managed_course_id",course.id).eq("user_role","course_admin").maybeSingle()
    ]).then(([s,h,o])=>{setCounts({photos:(course.photo_urls||[]).length,slots:s.count||0,holes:h.count||0});setOwner(o.data)}).catch(()=>{})
  },[course.id]);
  const comp=getCourseCompleteness(course,counts);const lst=course.listing_status||"draft";
  const STAT_CFG={draft:{l:"Borrador",c:C.acc},pending_review:{l:"Pendiente",c:C.gld},active:{l:"Activo",c:C.grn},suspended:{l:"Suspendido",c:C.acc}};const cfg=STAT_CFG[lst];
  async function doAction(){setBusy(true);const upd={};let emailType=null;
    if(action==="approve"){upd.listing_status="active";upd.approved_at=new Date().toISOString();upd.approved_by=adminId||null;upd.suspension_reason=null;emailType="course_approved"}
    else if(action==="reject"){upd.listing_status="draft";upd.suspension_reason=reason||"Requiere mejoras adicionales";emailType="course_rejected"}
    else if(action==="suspend"){if(!reason)return window.__toast?.("Razón requerida","warn")||setBusy(false);upd.listing_status="suspended";upd.suspension_reason=reason;emailType="course_suspended"}
    else if(action==="reactivate"){upd.listing_status="active";upd.suspension_reason=null;emailType="course_reactivated"}
    const{error}=await sb.from("golf_courses").update(upd).eq("id",course.id);
    if(error){window.__toast?.(error.message,"error");setBusy(false);return}
    if(owner?.email&&emailType)fetch(SB_FN_URL+"/send-email",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:emailType,to:owner.email,data:{name:owner.full_name,course_name:course.course_name,reason:reason||null}})}).catch(()=>{});
    window.__toast?.("Aplicado","success");setBusy(false);onRefresh()
  }
  return<div className="modal-bg" onClick={onClose}><div className="modal-box" onClick={e=>e.stopPropagation()} style={{background:C.cd,border:"1px solid "+C.bd,maxWidth:480,maxHeight:"85vh",overflowY:"auto"}}>
    <div style={{..._s.flexB,marginBottom:14}}>
      <h3 style={{color:C.txt,fontSize:16,fontWeight:800,margin:0}}>{course.course_name}</h3>
      <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:C.tm}} dangerouslySetInnerHTML={{__html:ic("x",20,C.tm)}}/>
    </div>
    <div style={{fontSize:12,color:C.ts,marginBottom:10}}>{course.city}, {course.state} · {{campo:"Campo",plataforma:"Plataforma",simulador:"Simulador"}[course.facility_type||"campo"]}</div>
    <div style={{padding:"8px 12px",background:cfg.c+"15",border:"1px solid "+cfg.c+"30",borderRadius:10,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
      <div style={{fontSize:11,fontWeight:800,color:cfg.c,letterSpacing:".05em"}}>{cfg.l.toUpperCase()}</div>
      {course.suspension_reason&&<div style={{fontSize:11,color:C.ts,marginLeft:"auto"}}>· {course.suspension_reason.slice(0,40)}</div>}
    </div>
    {owner&&<div className="sc" style={{marginBottom:12}}><div style={{fontSize:10,color:C.tm,fontWeight:600,marginBottom:4}}>PROPIETARIO</div><div style={{fontSize:13,fontWeight:700,color:C.txt}}>{owner.full_name}</div><div style={{fontSize:12,color:C.ts,marginTop:2}}>{owner.email}{owner.phone?" · "+owner.phone:""}</div></div>}
    <div style={{..._s.grid2lg,marginBottom:12}}>
      <div className="sc"><div className="n" style={{color:C.grn}}>${fm(course._rev30||0)}</div><div className="l">Revenue 30d</div></div>
      <div className="sc"><div className="n" style={{color:C.acc}}>{counts.slots}</div><div className="l">Slots futuros</div></div>
    </div>
    <h4 style={{fontSize:12,fontWeight:800,color:C.txt,marginBottom:8,marginTop:10}}>Completeness {comp.pct}%</h4>
    <div style={{height:6,background:C.bg,borderRadius:6,overflow:"hidden",marginBottom:10}}><div style={{width:comp.pct+"%",height:"100%",background:comp.allDone?C.grn:C.gld,borderRadius:6}}/></div>
    <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:14}}>{comp.items.map(it=><div key={it.k} style={{display:"flex",alignItems:"center",gap:8,fontSize:11}}><div style={{width:14,height:14,borderRadius:"50%",background:it.p?C.grn+"20":C.bd,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}} dangerouslySetInnerHTML={{__html:ic(it.p?"check":"x",8,it.p?C.grn:C.tm)}}/><span style={{color:it.p?C.ts:C.txt}}>{it.l}</span></div>)}</div>
    {action?<div style={{background:C.bg,border:"1px solid "+C.bd,borderRadius:12,padding:12,marginBottom:12}}>
      <div style={{fontSize:12,fontWeight:700,color:C.txt,marginBottom:8}}>{{approve:"Aprobar campo",reject:"Rechazar — regresa a borrador",suspend:"Suspender campo",reactivate:"Reactivar campo"}[action]}</div>
      {(action==="reject"||action==="suspend")&&<textarea value={reason} onChange={e=>setReason(e.target.value)} placeholder={action==="reject"?"Razones para rechazar (el admin la verá)":"Razón de suspensión"} rows={3} style={{...inp0,marginBottom:8,resize:"vertical",fontFamily:"inherit"}}/>}
      <div style={{display:"flex",gap:8}}>
        <button onClick={doAction} disabled={busy||((action==="reject"||action==="suspend")&&!reason.trim())} style={{flex:1,padding:10,background:action==="approve"||action==="reactivate"?C.grn:C.acc,border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:12,cursor:busy?"wait":"pointer",opacity:busy?.6:1}}>{busy?"...":"Confirmar"}</button>
        <button onClick={()=>{setAction(null);setReason("")}} style={{padding:"10px 16px",background:"transparent",border:"1px solid "+C.bd,borderRadius:10,color:C.ts,fontSize:12,cursor:"pointer"}}>Cancelar</button>
      </div>
