function ToastProvider({children}){const[toasts,setToasts]=useState([]);const[cDialog,setCDialog]=useState(null);
  const toast=(msg,type="info")=>{const id=Date.now();setToasts(p=>[...p,{id,msg,type}]);setTimeout(()=>setToasts(p=>p.map(t=>t.id===id?{...t,out:true}:t)),2800);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3200)};
  const confirm=(msg,onYes,onNo)=>setCDialog({msg,onYes:()=>{setCDialog(null);onYes?.()},onNo:()=>{setCDialog(null);onNo?.()}});
  return<ToastCtx.Provider value={{toast,confirm}}>{children}
    <div className="toast-wrap">{toasts.map(t=><div key={t.id} className={"toast "+t.type+(t.out?" toast-out":"")}>
      <span>{t.type==="success"?"✓":t.type==="error"?"✕":t.type==="warn"?"⚠":"ℹ"}</span><span>{t.msg}</span>
    </div>)}</div>
    {cDialog&&<div className="confirm-overlay" onClick={cDialog.onNo}><div className="confirm-box" onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:28,marginBottom:12}}>&#9888;</div>

function PullRefresh({onRefresh,children}){
  const[pulling,setPulling]=useState(false);const[refreshing,setRefreshing]=useState(false);
  const startY=useRef(0);const el=useRef(null);
  const onTouchStart=e=>{if(el.current?.scrollTop===0)startY.current=e.touches[0].clientY};
  const onTouchMove=e=>{if(!startY.current)return;const dy=e.touches[0].clientY-startY.current;if(dy>60&&el.current?.scrollTop===0)setPulling(true)};
  const onTouchEnd=async()=>{if(pulling&&!refreshing){setRefreshing(true);setPulling(false);await onRefresh?.();setRefreshing(false)}startY.current=0;setPulling(false)};
  return<div ref={el} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} style={{overflowY:"auto",flex:1}}>
    {(pulling||refreshing)&&<div className="ptr-indicator">{refreshing?<><div className="ptr-spin"/>Actualizando...</>:"↓ Suelta para actualizar"}</div>}
    {children}
  </div>}

function urlB64ToUint8(b64){const p="=".repeat((4-b64.length%4)%4);const b=(b64+p).replace(/-/g,"+").replace(/_/g,"/");const r=atob(b);return Uint8Array.from(r,c=>c.charCodeAt(0))}
async function initPush(userId){
  if(!("serviceWorker" in navigator)||!("PushManager" in window))return;
  try{
    const reg=await navigator.serviceWorker.register("/sw.js");
    const existing=await reg.pushManager.getSubscription();
    if(existing)return;
    const perm=await Notification.requestPermission();
    if(perm!=="granted")return;
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(VAPID_PUB)});
    const key=sub.getKey("p256dh");const auth=sub.getKey("auth");
    if(!key||!auth)return;
    const p256dh=btoa(String.fromCharCode(...new Uint8Array(key))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
    const authKey=btoa(String.fromCharCode(...new Uint8Array(auth))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
    await sb.from("push_subscriptions").upsert({user_id:userId,endpoint:sub.endpoint,p256dh,auth_key:authKey},{onConflict:"user_id,endpoint"});
  }catch(e){console.log("Push setup skipped:",e.message)}}

async function validatePromo(code,userId,role){
  if(!code||!code.trim())return{ok:false,msg:"Ingresa un código"};

  if(error||!pc)return{ok:false,msg:"Código inválido o expirado"};
  if(pc.target_role!==role)return{ok:false,msg:"Este código no aplica para tu perfil"};
  if(pc.current_uses>=pc.max_uses_global)return{ok:false,msg:"Código agotado"};
  if(pc.valid_until&&new Date(pc.valid_until)<new Date())return{ok:false,msg:"Código expirado"};

function FriendsTab(){const{s}=useA();const[friends,setFriends]=useState([]);const[received,setReceived]=useState([]);const[search,setSearch]=useState("");const[results,setResults]=useState([]);const[ld,setLd]=useState(true);const[vp,setVp]=useState(null);const[vpStats,setVpStats]=useState(null);

  const addF=async fid=>{await sb.from("friends").insert({user_id:s.user.id,friend_id:fid,status:"pending"});createNotif(fid,"friend_request","Solicitud de amistad",(p?.full_name||"Un jugador")+" quiere ser tu amigo",{});setResults(r=>r.filter(x=>x.id!==fid));loadAll()};

  const openProfile=async(f)=>{setVp(f);const{data:bks}=await sb.from("bookings").select("course_name,booking_date").eq("user_id",f.id).eq("status","confirmed").order("booking_date",{ascending:false}).limit(10);const{count:tCount}=await sb.from("tournament_players").select("id",{count:"exact"}).eq("user_id",f.id);const coursesPlayed=[...new Set((bks||[]).map(b=>b.course_name))];setVpStats({bookings:(bks||[]).length,tournaments:tCount||0,coursesPlayed,lastPlayed:(bks||[])[0]?.booking_date||null})};
  const calcAge=(d)=>{if(!d)return null;const b=new Date(d+"T00:00:00");const now=new Date();let a=now.getFullYear()-b.getFullYear();if(now.getMonth()<b.getMonth()||(now.getMonth()===b.getMonth()&&now.getDate()<b.getDate()))a--;return a};

    setSt({bks:allBk.length,rev,occ:cap?Math.round(booked/cap*100):0,avg,lastMoAvg:lastMo?.avgTicket||0,lastMoLabel:lastMo?.label||"--",lastMoPlayers:lastMo?.players||0,occBands,frequent,newC,returning,uniqueUsers:Object.keys(userBks).length});setLd(false)}).catch(()=>setLd(false))},[]);
  if(ld||!st)return<div style={{padding:16}}><Skeleton w="100%" h={50} mb={10}/><Skeleton w="80%" h={50}/></div>;

function AdminProfile({course,onOut,onRefresh}){const{s}=useA();const[ed,setEd]=useState(false);const[sv,setSv]=useState(false);const[desc,setDesc]=useState(course.description||"");const[phone,setPhone]=useState(course.phone_number||"");const[feeMin,setFeeMin]=useState(course.green_fee_min?.toString()||"");const[feeMax,setFeeMax]=useState(course.green_fee_max?.toString()||"");

function ScorecardScreen({onBack}){const{s}=useA();const[cards,setCards]=useState([]);const[ld,setLd]=useState(true);const[create,setCreate]=useState(false);const[pastBks,setPastBks]=useState([]);const[selBk,setSelBk]=useState(null);const[holes,setHoles]=useState([]);const[scores,setScores]=useState({});const[saving,setSaving]=useState(false);
  useEffect(()=>{loadCards()},[]);async function loadCards(){setLd(true);const{data}=await sb.from("scorecards").select("*").eq("user_id",s.user.id).order("round_date",{ascending:false});setCards(data||[]);setLd(false)}
  async function startCreate(){const td=new Date().toISOString().split("T")[0];const{data}=await sb.from("bookings").select("*").eq("user_id",s.user.id).eq("status","confirmed").lte("booking_date",td).not("course_id","is",null).order("booking_date",{ascending:false}).limit(20);setPastBks(data||[]);setCreate(true)}
  async function pickBooking(b){setSelBk(b);const{data:h}=await sb.from("course_holes").select("*").eq("course_id",b.course_id).order("hole_number");setHoles(h||[]);setScores({})}
  async function saveCard(){if(!selBk||Object.keys(scores).length===0)return;setSaving(true);const totalStr=Object.values(scores).reduce((s,v)=>s+v,0);const totalPar=holes.filter(h=>scores[h.hole_number]).reduce((s,h)=>s+h.par,0);const playedHoles=Object.keys(scores).length;const courseRating=totalPar*(72/Math.max(totalPar,1));const slopeRating=113;const diff=playedHoles>=14?Math.round(((totalStr-courseRating)*113/slopeRating)*10)/10:null;
    const{data:sc}=await sb.from("scorecards").insert({user_id:s.user.id,booking_id:selBk.id,course_id:selBk.course_id,course_name:selBk.course_name,round_date:selBk.booking_date,total_strokes:totalStr,total_par:totalPar,vs_par:totalStr-totalPar,score_differential:diff}).select().single();
    if(sc){const hd=Object.entries(scores).map(([num,str])=>{const h=holes.find(x=>x.hole_number===parseInt(num));return{scorecard_id:sc.id,hole_number:parseInt(num),par:h?.par||4,strokes:str}});if(hd.length)await sb.from("scorecard_holes").insert(hd)}
    const{data:recent}=await sb.from("scorecards").select("score_differential").eq("user_id",s.user.id).not("score_differential","is",null).order("round_date",{ascending:false}).limit(20);
    if(recent?.length>=3){const diffs=recent.map(r=>r.score_differential).sort((a,b)=>a-b);const best=diffs.slice(0,Math.max(1,Math.floor(diffs.length*0.4)));const hcp=Math.round(best.reduce((s,d)=>s+d,0)/best.length*10)/10;await sb.from("user_profiles").update({handicap:hcp}).eq("id",s.user.id)}
    setSaving(false);setCreate(false);setSelBk(null);loadCards()}
  const handicap=cards.filter(c=>c.score_differential!=null).length>=3?(()=>{const d=cards.filter(c=>c.score_differential!=null).map(c=>c.score_differential).sort((a,b)=>a-b);const b=d.slice(0,Math.max(1,Math.floor(d.length*0.4)));return(b.reduce((s,x)=>s+x,0)/b.length).toFixed(1)})():null;
  if(create&&selBk)return<div className="fi" style={{padding:16}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><button onClick={()=>setSelBk(null)} style={{background:"none",border:"none",cursor:"pointer",color:C.txt,display:"flex",alignItems:"center"}} dangerouslySetInnerHTML={{__html:ic("left",22,C.txt)}}/><h2 style={{margin:0,fontSize:18,fontWeight:700,color:C.txt}}>{selBk.course_name}</h2></div>
    {holes.length>0?<div style={{overflowX:"auto"}}><table className="scorecard"><thead><tr><th>Hoyo</th><th>Par</th><th>Score</th><th>+/-</th></tr></thead><tbody>{holes.map(h=>{const sc=scores[h.hole_number];const d=sc?sc-h.par:null;return<tr key={h.hole_number}><td style={{fontWeight:700}}>{h.hole_number}</td><td>{h.par}</td><td><input type="number" min="1" max="15" value={sc||""} onChange={e=>{const v=parseInt(e.target.value);if(v>=1&&v<=15)setScores(p=>({...p,[h.hole_number]:v}))}} placeholder="-"/></td><td style={{color:d>0?C.acc:d<0?C.grn:C.ts,fontWeight:700}}>{d!=null?(d>0?"+":"")+d:"-"}</td></tr>})}<tr style={{background:C.c2}}><td style={{fontWeight:700}}>Total</td><td>{holes.reduce((s,h)=>s+h.par,0)}</td><td style={{fontWeight:800}}>{Object.values(scores).reduce((s,v)=>s+v,0)||"--"}</td><td></td></tr></tbody></table></div>:<p style={{color:C.tm}}>Sin hoyos configurados</p>}
    <button onClick={saveCard} disabled={saving||Object.keys(scores).length===0} style={{width:"100%",padding:14,marginTop:14,background:Object.keys(scores).length?`linear-gradient(135deg,${C.grn},#00cec9)`:C.cd,border:"none",borderRadius:14,color:"#fff",fontWeight:700,cursor:"pointer"}}>{saving?"Guardando...":"Guardar"}</button></div>;
  if(create)return<div className="fi" style={{padding:16}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><button onClick={()=>setCreate(false)} style={{background:"none",border:"none",cursor:"pointer",color:C.txt,display:"flex",alignItems:"center"}} dangerouslySetInnerHTML={{__html:ic("left",22,C.txt)}}/><h2 style={{margin:0,fontSize:18,fontWeight:700,color:C.txt}}>Selecciona Ronda</h2></div>{pastBks.length===0?<p style={{color:C.tm,textAlign:"center",padding:30}}>Sin rondas</p>:pastBks.map(b=><div key={b.id} onClick={()=>pickBooking(b)} style={{background:C.cd,borderRadius:14,padding:14,marginBottom:8,border:"1px solid "+C.bd,cursor:"pointer"}}><div style={{fontSize:13,fontWeight:700,color:C.txt}}>{b.course_name}</div><div style={{fontSize:12,color:C.ts,marginTop:3}}>{b.booking_date} · {b.booking_time?.slice(0,5)}</div></div>)}</div>;
  return<div className="fi" style={{padding:16}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",color:C.txt,display:"flex",alignItems:"center"}} dangerouslySetInnerHTML={{__html:ic("left",22,C.txt)}}/><h2 style={{margin:0,fontSize:18,fontWeight:800,color:C.txt}} dangerouslySetInnerHTML={{__html:ic("grid",18,C.txt)+" Scorecard"}}/></div>
    {handicap&&<div className="sc" style={{marginBottom:14,border:"1px solid "+C.grn+"30"}}><div className="n" style={{color:C.grn}}>{handicap}</div><div className="l">Handicap WHS</div></div>}
    <button onClick={startCreate} style={{width:"100%",padding:14,marginBottom:14,background:`linear-gradient(135deg,${C.acc},#ff6b6b)`,border:"none",borderRadius:14,color:"#fff",fontWeight:700,cursor:"pointer"}}>+ Nueva</button>
    {ld?<Skeleton w="100%" h={60}/>:cards.length===0?<div style={{textAlign:"center",padding:30,color:C.tm}}>Sin scorecards</div>:cards.map(c=><div key={c.id} className="ar"><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.txt}}>{c.course_name}</div><div style={{fontSize:12,color:C.ts,marginTop:2}}>{c.round_date}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:800,color:C.txt}}>{c.total_strokes}</div><div style={{fontSize:11,color:c.vs_par>0?C.acc:c.vs_par<0?C.grn:C.ts}}>{c.vs_par>0?"+":""}{c.vs_par}</div></div></div>)}
  </div>}

function PremiumInsights({course}){const{s}=useA();const{sub,isPremium}=usePremium();const[showPricing,setShowPricing]=useState(false);const[bench,setBench]=useState(null);const[mySt,setMySt]=useState(null);const[ld,setLd]=useState(true);

  async function loadData(){const[bkR,slR,bmR]=await Promise.all([sb.from("bookings").select("id,total_cost,booking_date,booking_time,party_size").eq("course_id",course.id).eq("status","confirmed"),sb.from("time_slots").select("id,slot_time,slot_date,status,price,booked_count,capacity,course_id").eq("course_name",course.course_name),sb.from("market_benchmarks").select("*")]);
    const bks=bkR.data||[];const slots=slR.data||[];const benchmarks=bmR.data||[];const rev=bks.reduce((s,b)=>s+Number(b.total_cost||0),0);const avgTicket=bks.length?Math.round(rev/bks.length):0;const cap=slots.reduce((s,x)=>s+(x.capacity||0),0);const booked=slots.reduce((s,x)=>s+(x.booked_count||0),0);const occ=cap?Math.round(booked/cap*100):0;
    const byHour={};slots.forEach(sl=>{const h=parseInt(sl.slot_time?.split(":")[0]||"0");if(!byHour[h])byHour[h]={t:0,b:0,rev:0};byHour[h].t+=sl.capacity||0;byHour[h].b+=sl.booked_count||0});bks.forEach(b=>{const h=parseInt(b.booking_time?.split(":")[0]||"0");if(byHour[h])byHour[h].rev+=Number(b.total_cost||0)});
    const hourData=Object.entries(byHour).map(([h,d])=>({hour:parseInt(h),occ:d.t?Math.round(d.b/d.t*100):0,rev:d.rev})).sort((a,b)=>a.hour-b.hour);
    const myBench=benchmarks.find(b=>b.course_type===course.course_type&&b.facility_type===(course.facility_type||"campo"))||benchmarks[0];
    setBench(myBench);setMySt({rev,avgTicket,occ,bks:bks.length,hourData,feeMin:course.green_fee_min,feeMax:course.green_fee_max});setLd(false)}
  async function activatePlan(plan,promo){const price=promo&&promo.discount_type==="free"?0:PLANS[plan].price;if(price===0){const exp=new Date();plan==="annual"?exp.setFullYear(exp.getFullYear()+1):exp.setMonth(exp.getMonth()+1);await sb.from("admin_subscriptions").upsert({user_id:s.user.id,plan,status:"active",price_mxn:0,started_at:new Date().toISOString(),expires_at:exp.toISOString()},{onConflict:"user_id"});await sb.from("user_profiles").update({subscription_plan:plan}).eq("id",s.user.id);if(promo)await redeemPromo(promo.id,s.user.id,"premium",null,PLANS[plan].price);setShowPricing(false);location.reload();return}const sr=await stripeCheckout({type:"premium",plan,user_email:s.user.email});if(sr.error)window.__toast?.(sr.error,"error");setShowPricing(false)}
