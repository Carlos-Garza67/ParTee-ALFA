function Auth({children}){const[s,setS]=useState(null);const[p,setP]=useState(null);const[ld,setLd]=useState(true);
  useEffect(()=>{

    const authTimeout=setTimeout(()=>{if(ld){console.warn("Auth timeout - proceeding as logged out");setLd(false)}},8000);
    sb.auth.getSession().then(({data:{session}})=>{clearTimeout(authTimeout);setS(session);if(session)lp(session.user.id);else setLd(false)}).catch(()=>{clearTimeout(authTimeout);setLd(false)});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,ss)=>{setS(ss);if(ss)lp(ss.user.id);else{setP(null);setLd(false)}});return()=>{clearTimeout(authTimeout);subscription.unsubscribe()}},[]);
  async function lp(uid){try{let{data}=await sb.from("user_profiles").select("*").eq("id",uid).single();if(!data){const{data:u}=await sb.auth.getUser();await sb.from("user_profiles").insert({id:uid,email:u?.user?.email||"",full_name:(u?.user?.email||"").split("@")[0]});({data}=await sb.from("user_profiles").select("*").eq("id",uid).single())}setP(data);setLd(false);if(data?.user_role==="player")initPush(data.id).catch(()=>{})}catch(e){console.error("Profile load error:",e);setLd(false)}}

}

/* ═══ PUSH NOTIFICATIONS ═══ */
const VAPID_PUB="BDB0DG-cSt-uK1nOLHx1_g6zjC8jY_jz9qNuXNMwB8DUUeyExkFq12H3Y_7_3eO5e6CAQvh9gjQ97f1OOvaRbUM";
function urlB64ToUint8(b64){const p="=".repeat((4-b64.length%4)%4);const b=(b64+p).replace(/-/g,"+").replace(/_/g,"/");const r=atob(b);return Uint8Array.from(r,c=>c.charCodeAt(0))}

async function initPush(userId){
  if(!("serviceWorker" in navigator)||!("PushManager" in window))return;
  try{
    const reg=await navigator.serviceWorker.register("/sw.js");
    const existing=await reg.pushManager.getSubscription();
    if(existing)return;
    const perm=await Notification.requestPermission();
    if(perm!=="granted")return;
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(VAPID_PUB)});
    const key=sub.getKey("p256dh");const auth=sub.getKey("auth");
    if(!key||!auth)return;
    const p256dh=btoa(String.fromCharCode(...new Uint8Array(key))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
    const authKey=btoa(String.fromCharCode(...new Uint8Array(auth))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
    await sb.from("push_subscriptions").upsert({user_id:userId,endpoint:sub.endpoint,p256dh,auth_key:authKey},{onConflict:"user_id,endpoint"});
  }catch(e){console.log("Push setup skipped:",e.message)}}

/* ═══ PROMO CODES ═══ */
async function validatePromo(code,userId,role){
  if(!code||!code.trim())return{ok:false,msg:"Ingresa un código"};
  const cd=code.trim().toUpperCase();
  const{data:pc,error}=await sb.from("promo_codes").select("*").eq("code",cd).eq("status","active").single();
  if(error||!pc)return{ok:false,msg:"Código inválido o expirado"};
  if(pc.target_role!==role)return{ok:false,msg:"Este código no aplica para tu perfil"};
  if(pc.current_uses>=pc.max_uses_global)return{ok:false,msg:"Código agotado (límite global alcanzado)"};
  if(pc.valid_until&&new Date(pc.valid_until)<new Date())return{ok:false,msg:"Código expirado"};
  const{data:used}=await sb.from("promo_code_uses").select("id").eq("promo_code_id",pc.id).eq("user_id",userId);
  if(used&&used.length>=pc.max_uses_per_user)return{ok:false,msg:"Ya usaste este código"};
  return{ok:true,promo:pc,msg:pc.discount_type==="percent"?pc.discount_value+"% de descuento":pc.discount_type==="free"?"100% gratis":"$"+fm(pc.discount_value)+" de descuento"}}

async function redeemPromo(promoId,userId,contextType,contextId,discountApplied){
  await sb.from("promo_code_uses").insert({promo_code_id:promoId,user_id:userId,context_type:contextType,context_id:contextId,discount_applied:discountApplied});
  await sb.rpc("increment_promo_uses",{promo_id:promoId}).catch(()=>{
    sb.from("promo_codes").select("current_uses").eq("id",promoId).single().then(({data})=>{
      if(data)sb.from("promo_codes").update({current_uses:(data.current_uses||0)+1}).eq("id",promoId)})
  })}

  const price=Number(sl.price);const gT=price*n;const eT=Object.entries(cart).reduce((s,[eid,q])=>{const ex=extras.find(e=>e.id===eid);return s+(ex?Number(ex.price)*q:0)},0);const discount=appliedPromo?appliedPromo.discount_type==="percent"?Math.round(gT*appliedPromo.discount_value/100):appliedPromo.discount_type==="fixed"?Math.min(appliedPromo.discount_value,gT):gT:0;const grand=Math.max(0,gT-discount+eT);
  const setQty=(eid,d)=>{setCart(prev=>{const c=prev[eid]||0;const nx=Math.max(0,c+d);if(nx===0){const{[eid]:_,...r}=prev;return r}return{...prev,[eid]:nx}})};
  const go=async()=>{if(!s)return;setBusy(true);const{data:bk,error}=await sb.from("bookings").insert({user_id:s.user.id,course_id:c.id,course_name:c.course_name,booking_date:sl.slot_date,booking_time:sl.slot_time,party_size:n,total_cost:grand,extras_total:eT,status:"confirmed",promo_code:appliedPromo?.code||null,discount_amount:discount||0}).select().single();if(error){alert(error.message);setBusy(false);return}const ei=Object.entries(cart).map(([eid,qty])=>{const ex=extras.find(e=>e.id===eid);return{booking_id:bk.id,extra_id:eid,quantity:qty,unit_price:Number(ex.price),total_price:Number(ex.price)*qty}}).filter(e=>e.quantity>0);if(ei.length>0)await sb.from("booking_extras").insert(ei);if(appliedPromo)await redeemPromo(appliedPromo.id,s.user.id,"booking",bk.id,discount);createNotif(s.user.id,"booking","Reserva confirmada","Tu reserva en "+c.course_name+" para el "+sl.slot_date+" a las "+sl.slot_time?.slice(0,5)+" está confirmada.",{course_name:c.course_name,booking_id:bk.id});
      fetch(SB_FN_URL+"/send-email",{method:"POST",headers:{"Authorization":"Bearer "+(await sb.auth.getSession()).data.session?.access_token,"apikey":SB_ANON,"Content-Type":"application/json"},body:JSON.stringify({type:"booking_confirmation",to:s.user.email,data:{course_name:c.course_name,date:sl.slot_date,time:sl.slot_time?.slice(0,5),total:grand,party_size:n}})}).catch(()=>{});if(grand>0){const sr=await stripeCheckout({type:"booking",booking_id:bk.id,course_name:c.course_name,amount:grand,date:sl.slot_date,time:sl.slot_time,party_size:n,promo_code:appliedPromo?.code||null,discount:discount||0,user_email:s.user.email});if(sr.error){alert("Reserva creada. Pago pendiente: "+sr.error);setBusy(false);onOk({bk,tot:grand});return}return}setBusy(false);onOk({bk,tot:grand})};
  const cats=[{k:"equipo",l:"&#127948; Equipo"},{k:"pelotas",l:"&#9898; Pelotas"},{k:"caddie",l:"&#129489; Caddie"},{k:"alimentos",l:"&#127860; Alimentos"}];
  return<div className="fi" style={{padding:20}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}><button onClick={onBack} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.txt}}>&#8592;</button><h2 style={{margin:0,fontSize:18,fontWeight:700,color:C.txt}}>Confirmar</h2></div>
    <div style={{background:C.cd,borderRadius:14,padding:14,border:"1px solid "+C.bd,marginBottom:14}}><h3 style={{color:C.txt,fontSize:15,fontWeight:700}}>{c.course_name}</h3><p style={{color:C.ts,fontSize:13,marginTop:4}}>{sl.slot_date} &#183; {sl.slot_time?.slice(0,5)}</p></div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:24,marginBottom:4}}><button onClick={()=>setN(Math.max(1,n-1))} style={{width:38,height:38,borderRadius:19,border:"1px solid "+C.bd,background:C.cd,fontSize:18,cursor:"pointer",color:C.txt}}>-</button><span style={{fontSize:26,fontWeight:800,color:C.txt}}>{n}</span><button onClick={()=>setN(Math.min(4,n+1))} style={{width:38,height:38,borderRadius:19,border:"1px solid "+C.bd,background:C.cd,fontSize:18,cursor:"pointer",color:C.txt}}>+</button></div>
    <p style={{textAlign:"center",fontSize:11,color:C.tm,marginBottom:14}}>{n===1?"Reserva individual":n+" jugadores"} (máx. 4){n>=2?<span style={{color:C.grn}}> · Compartir y Split disponible</span>:""}</p>
    <h3 style={{fontSize:15,fontWeight:700,color:C.txt,marginBottom:10}}>&#128722; Extras</h3>
    <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:10}}>{cats.map(ct=><button key={ct.k} className={"etab "+(cat===ct.k?"on":"off")} onClick={()=>setCat(ct.k)} dangerouslySetInnerHTML={{__html:ct.l}}/>)}</div>
    {extras.filter(e=>e.category===cat).map(ex=>{const qty=cart[ex.id]||0;return<div key={ex.id} className={"ecard"+(qty>0?" sel":"")}><span style={{fontSize:22}} dangerouslySetInnerHTML={{__html:ex.icon}}/><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:C.txt}}>{ex.name}</div><div style={{fontSize:13,fontWeight:800,color:qty>0?C.grn:C.acc,marginTop:2}}>${fm(ex.price)}</div></div><div style={{display:"flex",alignItems:"center",gap:5}}>{qty>0&&<><button onClick={()=>setQty(ex.id,-1)} style={{width:24,height:24,borderRadius:12,border:"1px solid "+C.bd,background:C.bg,color:C.txt,cursor:"pointer",fontSize:13}}>-</button><span style={{fontSize:13,fontWeight:700,color:C.txt,minWidth:14,textAlign:"center"}}>{qty}</span></>}<button onClick={()=>setQty(ex.id,1)} style={{width:24,height:24,borderRadius:12,border:"1px solid "+(qty?C.bd:C.grn),background:qty?C.bg:C.grn+"25",color:qty?C.txt:C.grn,cursor:"pointer",fontSize:13}}>+</button></div></div>})}
    <div style={{background:C.cd,borderRadius:14,padding:14,border:"1px solid "+C.bd,marginTop:14}}>
      <div style={{fontSize:13,fontWeight:700,color:C.txt,marginBottom:8}}>&#127381; Código Promocional</div>
      {appliedPromo?<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:10,background:C.grn+"15",borderRadius:8,border:"1px solid "+C.grn+"30"}}><div><div style={{fontSize:12,fontWeight:700,color:C.grn}}>&#10003; {appliedPromo.code} aplicado</div><div style={{fontSize:11,color:C.ts}}>{promoResult?.msg}</div></div><button onClick={()=>{setAppliedPromo(null);setPromoResult(null);setPromoCode("")}} style={{background:"none",border:"none",color:C.acc,fontSize:11,fontWeight:600,cursor:"pointer"}}>Quitar</button></div>
      :<div style={{display:"flex",gap:8}}><input value={promoCode} onChange={e=>setPromoCode(e.target.value.toUpperCase())} placeholder="Ej: OMNIMAN" maxLength={20} style={{flex:1,padding:10,background:C.bg,border:"1px solid "+(promoResult&&!promoResult.ok?C.acc:C.bd),borderRadius:8,color:C.txt,fontSize:13,fontFamily:"monospace",letterSpacing:2,outline:"none"}}/><button onClick={async()=>{setPromoLoading(true);const r=await validatePromo(promoCode,s.user.id,"player");setPromoResult(r);if(r.ok)setAppliedPromo(r.promo);setPromoLoading(false)}} disabled={promoLoading||!promoCode.trim()} style={{padding:"10px 16px",background:promoCode.trim()?`linear-gradient(135deg,${C.grn},#00cec9)`:C.cd,border:"none",borderRadius:8,color:promoCode.trim()?"#fff":C.tm,fontWeight:700,fontSize:12,cursor:"pointer"}}>{promoLoading?"...":"Aplicar"}</button></div>}
      {promoResult&&!promoResult.ok&&<div style={{fontSize:11,color:C.acc,marginTop:4}}>{promoResult.msg}</div>}
    </div>
    <div style={{background:C.cd,borderRadius:14,padding:16,border:"1px solid "+C.bd,marginTop:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{color:C.ts}}>Green fee x{n}</span><span style={{color:C.txt}}>${fm(gT)}</span></div>{discount>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{color:C.grn}}>&#127381; Descuento ({appliedPromo?.code})</span><span style={{color:C.grn,fontWeight:700}}>-${fm(discount)}</span></div>}{eT>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{color:C.ts}}>Extras</span><span style={{color:C.gld}}>${fm(eT)}</span></div>}<div style={{display:"flex",justifyContent:"space-between",borderTop:"2px solid "+C.bd,paddingTop:10}}><span style={{fontSize:17,fontWeight:700,color:C.txt}}>Total</span><span style={{fontSize:17,fontWeight:800,color:C.grn}}>${fm(grand)} MXN</span></div></div>
    <button onClick={go} disabled={busy} style={{width:"100%",padding:16,marginTop:14,background:`linear-gradient(135deg,${C.acc},#ff6b6b)`,color:"#fff",border:"none",borderRadius:14,fontSize:16,fontWeight:700,cursor:"pointer",opacity:busy?.6:1}}>Confirmar y Pagar</button></div>;
}

function BkTab(){const{s,p}=useA();const[bs,setBs]=useState([]);const[tab,setTab]=useState("up");const[ld,setLd]=useState(true);const[detail,setDetail]=useState(null);const[course,setCourse]=useState(null);const[bkExtras,setBkExtras]=useState([]);const[friends,setFriends]=useState([]);const[shareModal,setShareModal]=useState(null);const[selFr,setSelFr]=useState([]);
  const[shareMode,setShareMode]=useState(null);

  const openDetail=async(b)=>{setDetail(b);if(b.course_id){const{data:c}=await sb.from("golf_courses").select("*").eq("id",b.course_id).single();setCourse(c)}else{setCourse({course_name:b.course_name,city:"",state:"",photo_urls:[]})}const{data:ex}=await sb.from("booking_extras").select("*,extras_catalog(name,icon,price)").eq("booking_id",b.id);setBkExtras(ex||[])};

  const splitTotal=splitItems.reduce((s,x)=>s+Number(x.amount||0),0);
  const splitPerPerson=selFr.length>0?Math.round(splitTotal/(selFr.length+1)):0;

  const doShare=async()=>{if(!shareModal||selFr.length===0)return;
    try{const bk=shareModal;
    for(const fid of selFr){
      await sb.from("share_requests").upsert({
        booking_id:bk.id,sender_id:s.user.id,receiver_id:fid,
        share_mode:shareMode||"simple",status:"pending",
        split_amount:shareMode==="split"?splitPerPerson:0,

  const acceptReq=async(req)=>{
    await sb.from("share_requests").update({status:"accepted",updated_at:new Date().toISOString()}).eq("id",req.id);
    const senderName=req.sender?.full_name||"Amigo";
    await sb.from("bookings").insert({user_id:s.user.id,course_id:req.course_id||null,course_name:req.course_name,booking_date:req.booking_date,booking_time:req.booking_time,party_size:1,total_cost:req.split_amount||0,extras_total:0,status:"confirmed",shared_friends:[{id:req.sender_id,name:senderName,split:Number(req.split_amount)||0}]});

      </div>
      {/* Sent share requests status */}
      {bkReqs.length>0&&<div style={{background:C.cd,borderRadius:14,padding:14,border:"1px solid "+C.bd,marginBottom:14}}><h4 style={{fontSize:13,fontWeight:700,color:C.txt,marginBottom:8}}>&#128101; Solicitudes Enviadas</h4>
        {bkReqs.map(r=>{const st=reqStc[r.status];return<div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid "+C.bd+"40"}}><div><div style={{fontSize:13,color:C.txt}}>{friends.find(f=>f.friend?.id===r.receiver_id)?.friend?.full_name||"Amigo"}</div><div style={{fontSize:10,color:C.tm}}>{r.share_mode==="split"?"Split $"+fm(r.split_amount):"Compartida"}</div></div><span style={{fontSize:10,color:st?.c,background:(st?.c||C.tm)+"20",padding:"3px 8px",borderRadius:6,fontWeight:600}}>{st?.l}</span></div>})}</div>}
      {detail.status==="confirmed"&&<CalBtn course={detail.course_name} date={detail.booking_date} time={detail.booking_time}/>}
      {detail.status==="confirmed"&&<div style={{display:"flex",gap:8,marginBottom:14}}>
        {detail.party_size>=2?<button onClick={()=>{setShareModal(detail);setShareMode(null);setSelFr([]);setSplitItems([{name:"Green Fee",amount:detail.total_cost?.toString()||""}])}} style={{flex:1,padding:10,background:C.cd,border:"1px solid "+C.bd,borderRadius:10,color:C.ts,fontSize:13,fontWeight:600,cursor:"pointer"}}>&#128101; Compartir</button>

        <button onClick={async()=>{if(confirm("Cancelar?")){await sb.from("bookings").update({status:"cancelled"}).eq("id",detail.id);setDetail(null);load()}}} style={{padding:"10px 14px",background:C.acc+"20",border:"none",borderRadius:10,color:C.acc,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancelar</button>
      </div>}

  </div>;}

  // LIST VIEW
  return<div style={{padding:16}}><div style={{display:"flex",gap:8,marginBottom:14}}>{[{k:"up",l:"Próximas"},{k:"past",l:"Anteriores"},{k:"requests",l:"Solicitudes"+(recvReqs.length>0?" ("+recvReqs.length+")":"")}].map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{flex:1,padding:10,borderRadius:12,border:tab===t.k?"none":"1px solid "+C.bd,background:tab===t.k?`linear-gradient(135deg,${C.acc},#ff6b6b)`:C.cd,color:tab===t.k?"#fff":C.ts,fontSize:12,fontWeight:600,cursor:"pointer"}}>{t.l}</button>)}</div>

      {r.share_mode==="split"&&<div style={{background:C.grn+"12",borderRadius:8,padding:10,marginBottom:8}}><div style={{fontSize:13,fontWeight:700,color:C.grn}}>Split: ${fm(r.split_amount)} MXN</div>{r.split_items?.length>0&&r.split_items.map((it,i)=><div key={i} style={{fontSize:11,color:C.ts,marginTop:2}}>{it.name}: ${fm(it.amount)}</div>)}</div>}
      {r.share_mode==="simple"&&<div style={{fontSize:12,color:C.tm,marginBottom:8}}>Invitación sin split de gastos</div>}
      <div style={{display:"flex",gap:8}}><button onClick={()=>acceptReq(r)} style={{flex:1,padding:10,background:`linear-gradient(135deg,${C.grn},#00cec9)`,border:"none",borderRadius:10,color:"#fff",fontWeight:700,cursor:"pointer"}}>Aceptar</button><button onClick={()=>rejectReq(r)} style={{flex:1,padding:10,background:C.acc+"20",border:"none",borderRadius:10,color:C.acc,fontWeight:700,cursor:"pointer"}}>Rechazar</button></div>
    </div>})}</>}
    {tab!=="requests"&&(ld?<div className="pl" style={{textAlign:"center",padding:60,color:C.tm}}>Cargando...</div>:bs.length===0?<div style={{textAlign:"center",padding:60,color:C.tm}}>Sin reservas</div>:bs.map(b=>{const st=stc[b.status]||{l:b.status,c:C.gld};const bReqs=getReqsForBooking(b.id);return<div key={b.id} onClick={()=>openDetail(b)} style={{background:C.cd,borderRadius:12,padding:14,marginBottom:10,border:"1px solid "+C.bd,cursor:"pointer"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><h4 style={{margin:0,fontSize:14,fontWeight:700,color:C.txt}}>{b.course_name}</h4><span style={{fontSize:10,color:st.c,background:st.c+"20",padding:"3px 8px",borderRadius:6}}>{st.l}</span></div><div style={{fontSize:12,color:C.ts}}>{b.booking_date} &#183; {b.booking_time?.slice(0,5)} &#183; {b.party_size} jug</div><div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><span style={{fontSize:14,fontWeight:700,color:C.grn}}>${fm(b.total_cost)} MXN</span><div style={{display:"flex",gap:4,alignItems:"center"}}>{bReqs.length>0&&<span style={{fontSize:10,color:C.gld}}>&#128101;{bReqs.length}</span>}<span style={{color:C.ts,fontSize:12}}>&#8250;</span></div></div></div>}))}
  </div>;
}

function FriendsTab(){const{s}=useA();const[friends,setFriends]=useState([]);const[received,setReceived]=useState([]);const[search,setSearch]=useState("");const[results,setResults]=useState([]);const[ld,setLd]=useState(true);const[vp,setVp]=useState(null);const[vpStats,setVpStats]=useState(null);
  useEffect(()=>{if(s)loadAll()},[s]);async function loadAll(){setLd(true);const[fr,rc]=await Promise.all([sb.from("friends").select("*,friend:friend_id(id,full_name,email,handicap,player_id,nickname,city,state,points,ranking_position,fav_brand,handedness,birth_date)").eq("user_id",s.user.id).eq("status","accepted"),sb.from("friends").select("*,user:user_id(id,full_name,player_id)").eq("friend_id",s.user.id).eq("status","pending")]);
    const sorted=(fr.data||[]).sort((a,b)=>(a.friend?.full_name||"").localeCompare(b.friend?.full_name||""));setFriends(sorted);setReceived(rc.data||[]);setLd(false)}

  const addF=async fid=>{await sb.from("friends").insert({user_id:s.user.id,friend_id:fid,status:"pending"});createNotif(fid,"friend_request","Solicitud de amistad",(p?.full_name||"Un jugador")+" quiere ser tu amigo",{});setResults(r=>r.filter(x=>x.id!==fid));loadAll()};
  const acceptF=async(id,uid)=>{
    // 1. Accept the incoming request (sender→me)
    await sb.from("friends").update({status:"accepted"}).eq("id",id);
    // 2. Create reverse friendship (me→sender) so both see each other
    await sb.from("friends").upsert({user_id:s.user.id,friend_id:uid,status:"accepted"},{onConflict:"user_id,friend_id"});
    createNotif(uid,"friend_request","Amistad aceptada",(p?.full_name||"Un jugador")+" aceptó tu solicitud de amistad",{});
    loadAll()};
  const openProfile=async(f)=>{setVp(f);const{data:bks}=await sb.from("bookings").select("course_name,booking_date").eq("user_id",f.id).eq("status","confirmed").order("booking_date",{ascending:false}).limit(10);
    const{count:tCount}=await sb.from("tournament_players").select("id",{count:"exact"}).eq("user_id",f.id);
    const coursesPlayed=[...new Set((bks||[]).map(b=>b.course_name))];setVpStats({bookings:(bks||[]).length,tournaments:tCount||0,coursesPlayed,lastPlayed:(bks||[])[0]?.booking_date||null})};
  const calcAge=(d)=>{if(!d)return null;const b=new Date(d+"T00:00:00");const now=new Date();let a=now.getFullYear()-b.getFullYear();if(now.getMonth()<b.getMonth()||(now.getMonth()===b.getMonth()&&now.getDate()<b.getDate()))a--;return a};
  const displayName=(f)=>{const nm=f?.full_name||"";const nick=f?.nickname;return nick?<>{nm} <span style={{color:C.gld}}>"{nick}"</span></>:nm};
  if(ld)return<div className="pl" style={{textAlign:"center",padding:60,color:C.tm}}>Cargando...</div>;
  return<div style={{padding:16}}>
    <h3 style={{fontSize:16,fontWeight:700,color:C.txt,marginBottom:10}}>Agregar por Player ID</h3>
    <div style={{display:"flex",gap:8,marginBottom:14}}><input value={search} onChange={x=>setSearch(x.target.value)} onKeyDown={x=>x.key==="Enter"&&doSearch()} placeholder="PT-XXXXXXXX" style={{flex:1,background:C.cd,border:"1px solid "+C.bd,borderRadius:12,padding:"12px",fontSize:14,color:C.txt,outline:"none",fontFamily:"monospace"}}/><button onClick={doSearch} style={{padding:"0 14px",background:`linear-gradient(135deg,${C.acc},#ff6b6b)`,border:"none",borderRadius:12,color:"#fff",fontWeight:600,cursor:"pointer"}}>Buscar</button></div>
    {results.map(u=><div key={u.id} style={{display:"flex",alignItems:"center",gap:10,background:C.cd,borderRadius:10,padding:12,marginBottom:6,border:"1px solid "+C.bd}}><div style={{flex:1}}><div style={{color:C.txt,fontSize:14,fontWeight:600}}>{u.nickname?<>{u.full_name} <span style={{color:C.gld}}>"{u.nickname}"</span></>:u.full_name}</div><div style={{color:C.gld,fontSize:11,fontFamily:"monospace"}}>{u.player_id}</div></div><button onClick={()=>addF(u.id)} style={{padding:"6px 12px",background:C.grn+"30",border:"none",borderRadius:8,color:C.grn,fontSize:12,fontWeight:600,cursor:"pointer"}}>+</button></div>)}
    {received.length>0&&received.map(r=><div key={r.id} style={{display:"flex",alignItems:"center",gap:10,background:C.cd,borderRadius:10,padding:12,marginBottom:6,border:"1px solid "+C.gld+"40"}}><div style={{flex:1,color:C.txt,fontSize:14}}>{r.user?.full_name} <span style={{color:C.gld,fontSize:11}}>{r.user?.player_id}</span></div><button onClick={()=>acceptF(r.id,r.user_id)} style={{padding:"6px 12px",background:C.grn+"30",border:"none",borderRadius:8,color:C.grn,fontSize:11,fontWeight:600,cursor:"pointer"}}>Aceptar</button></div>)}
    <h3 style={{fontSize:15,fontWeight:700,color:C.txt,margin:"14px 0 8px"}}>Amigos ({friends.length})</h3>
    {friends.length===0?<p style={{color:C.tm,textAlign:"center",padding:20}}>Busca por Player ID</p>:friends.map(f=><div key={f.id} onClick={()=>openProfile(f.friend)} style={{display:"flex",alignItems:"center",gap:10,background:C.cd,borderRadius:10,padding:12,marginBottom:6,border:"1px solid "+C.bd,cursor:"pointer"}}><div style={{width:36,height:36,borderRadius:18,background:C.grn+"30",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>&#128100;</div><div style={{flex:1}}><div style={{color:C.txt,fontSize:14,fontWeight:600}}>{displayName(f.friend)}</div><div style={{display:"flex",gap:6,marginTop:2}}><span style={{color:C.gld,fontSize:10,fontFamily:"monospace"}}>{f.friend?.player_id}</span>{f.friend?.city&&<span style={{color:C.tm,fontSize:10}}>· {f.friend?.city}</span>}</div></div><span style={{color:C.ts,fontSize:12}}>&#8250;</span></div>)}
    {/* FRIEND PROFILE MODAL — Complete */}
    {vp&&<div className="modal-bg" onClick={()=>{setVp(null);setVpStats(null)}}><div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxHeight:"90vh",overflowY:"auto"}}>
      <div className="player-card" style={{marginBottom:14}}><div style={{display:"flex",alignItems:"center",gap:14,position:"relative",zIndex:1}}><div style={{width:50,height:50,borderRadius:25,background:`linear-gradient(135deg,${C.acc},#ff6b6b)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>&#128100;</div><div><h2 style={{fontSize:16,fontWeight:800,color:C.txt,margin:0}}>{displayName(vp)}</h2><p style={{fontSize:11,color:C.gld,fontFamily:"monospace",marginTop:3}}>{vp.player_id}</p>{calcAge(vp.birth_date)!=null&&<p style={{fontSize:11,color:C.ts,marginTop:2}}>{calcAge(vp.birth_date)} años</p>}</div></div>
        <div style={{display:"flex",gap:8,marginTop:12}}>{[{v:"#"+(vp.ranking_position||"--"),l:"Rank",c:C.gld},{v:vp.points||0,l:"Pts",c:C.grn},{v:vp.handicap||"--",l:"HCP",c:C.txt},{v:vpStats?.tournaments||0,l:"Torneos",c:C.acc}].map((x,i)=><div key={i} style={{flex:1,background:"rgba(255,255,255,.08)",borderRadius:10,padding:8,textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:x.c}}>{x.v}</div><div style={{fontSize:9,color:"rgba(255,255,255,.5)"}}>{x.l}</div></div>)}</div></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>{[{l:"Ciudad",v:vp.city},{l:"Estado",v:vp.state},{l:"Mano",v:vp.handedness==="zurdo"?"Zurdo":"Diestro"},{l:"Marca fav.",v:vp.fav_brand},{l:"Rondas jugadas",v:vpStats?.bookings},{l:"Última ronda",v:vpStats?.lastPlayed||"--"}].filter(x=>x.v).map((x,i)=><div key={i} style={{background:C.cd,borderRadius:10,padding:10,border:"1px solid "+C.bd}}><div style={{fontSize:10,color:C.tm}}>{x.l}</div><div style={{fontSize:13,color:C.txt,fontWeight:600,marginTop:2}}>{x.v}</div></div>)}</div>
      {vpStats?.coursesPlayed?.length>0&&<><h4 style={{fontSize:13,fontWeight:700,color:C.txt,marginBottom:6}}>Campos jugados ({vpStats.coursesPlayed.length})</h4>{vpStats.coursesPlayed.map((c,i)=><div key={i} style={{fontSize:12,color:C.ts,padding:"4px 0"}}>⛳ {c}</div>)}</>}
      <button onClick={()=>{setVp(null);setVpStats(null)}} style={{width:"100%",padding:12,marginTop:14,background:"transparent",border:"1px solid "+C.bd,borderRadius:10,color:C.ts,cursor:"pointer"}}>Cerrar</button>

/* ═══════════════════════════════════════════════════
   TOURNAMENT TAB — Modes, Formats, Teams
   ═══════════════════════════════════════════════════ */
const MODES={individual:{l:"Individual",i:"&#128100;",d:"Cada jugador compite por si mismo"},teams:{l:"Equipos",i:"&#128101;",d:"Compite en equipos de 2"}};
const FORMATS={individual:[
  {k:"stroke_play",l:"Stroke Play",d:"Menor número total de golpes gana",i:"&#127942;"},
  {k:"stableford",l:"Stableford",d:"Puntos por hoyo segun desempeno vs par. Mayor puntaje gana",i:"&#11088;"},
  {k:"match_play",l:"Match Play",d:"Hoyo por hoyo: menos golpes gana el hoyo. Mas hoyos ganados gana",i:"&#9876;"}
],teams:[
  {k:"scramble",l:"Scramble",d:"Mejor bola del equipo, todos juegan desde ahi",i:"&#127942;"},
  {k:"four_ball",l:"Four-Ball",d:"Cada jugador su bola, cuenta el mejor score por equipo por hoyo",i:"&#9971;"}
]};
function stablefordPts(strokes,par){if(!strokes)return 0;const d=strokes-par;if(d<=-3)return 5;if(d===-2)return 4;if(d===-1)return 3;if(d===0)return 2;if(d===1)return 1;return 0}

function TourneoTab(){
  const{s,p}=useA();
  const[torneos,setTorneos]=useState([]);const[ld,setLd]=useState(true);
  const[view,setView]=useState("list");
  const[activeTorneo,setActiveTorneo]=useState(null);
  // Create wizard state
  const[step,setStep]=useState(1);// 1=mode,2=format,3=course,4=players,5=teams
  const[gMode,setGMode]=useState("");const[gFmt,setGFmt]=useState("");
  const[tName,setTName]=useState("");const[courses,setCourses]=useState([]);const[selCourse,setSelCourse]=useState(null);
  const[friends,setFriends]=useState([]);const[selFr,setSelFr]=useState([]);
  const[teamAssign,setTeamAssign]=useState({});// {friendId:"A"|"B"}
  // Detail state
  const[players,setPlayers]=useState([]);const[holes,setHoles]=useState([]);const[scores,setScores]=useState({});

  useEffect(()=>{if(s)loadTorneos()},[s]);
  async function loadTorneos(){setLd(true);
    const{data:tp}=await sb.from("tournament_players").select("tournament_id").eq("user_id",s.user.id);
    const tids=[...new Set((tp||[]).map(t=>t.tournament_id))];
    if(tids.length>0){const{data}=await sb.from("tournaments").select("*").in("id",tids).order("created_at",{ascending:false});setTorneos(data||[])}else setTorneos([]);
    setLd(false)}

  async function startCreate(){setStep(1);setGMode("");setGFmt("");setTName("");setSelCourse(null);setSelFr([]);setTeamAssign({});
    const[{data:c},{data:bks},{data:f}]=await Promise.all([
      sb.from("golf_courses").select("id,course_name,city").eq("status","active").order("course_name"),
      sb.from("bookings").select("course_id").eq("user_id",s.user.id).eq("status","confirmed").gte("booking_date",new Date().toISOString().split("T")[0]),
      sb.from("friends").select("*,friend:friend_id(id,full_name,player_id)").eq("user_id",s.user.id).eq("status","accepted")
    ]);
    const activeCids=new Set((bks||[]).map(b=>b.course_id));
    const sorted=(c||[]).map(x=>({...x,hasBooking:activeCids.has(x.id)})).sort((a,b)=>a.hasBooking===b.hasBooking?a.course_name.localeCompare(b.course_name):(b.hasBooking?1:0)-(a.hasBooking?1:0));
    setCourses(sorted);setFriends(f||[]);setView("create")}

  const maxPlayers=gMode==="teams"?4:4;// max friends (+ creator = 5 total for individual, need even for teams)
  const canNext=()=>{
    if(step===1)return!!gMode;
    if(step===2)return!!gFmt;
    if(step===3)return!!tName&&!!selCourse;
    if(step===4){if(gMode==="teams")return selFr.length>=1&&selFr.length%2!==0;return selFr.length>=1}// teams need odd # of friends (+ creator = even total)
    if(step===5){const vals=Object.values(teamAssign);return vals.filter(v=>v==="A").length>0&&vals.filter(v=>v==="B").length>0}
    return false};
  const nextStep=()=>{if(!canNext())return;if(step===4&&gMode==="individual"){createTorneo();return}if(step===4&&gMode==="teams"){setTeamAssign({});setStep(5);return}if(step===5){createTorneo();return}setStep(step+1)};

  async function createTorneo(){
    const c=courses.find(x=>x.id===selCourse);
    const{data:t,error}=await sb.from("tournaments").insert({name:tName,created_by:s.user.id,course_id:selCourse,course_name:c?.course_name||"",status:"active",game_mode:gMode,game_format:gFmt}).select().single();
    if(error)return alert(error.message);
    // Add creator
    const myTeam=gMode==="teams"?"A":null;
    await sb.from("tournament_players").insert({tournament_id:t.id,user_id:s.user.id,player_name:p?.nickname||p?.full_name||"",player_pid:p?.player_id,is_creator:true,team:myTeam});
    // Add friends
    for(const fid of selFr){const f=friends.find(x=>x.friend?.id===fid);const team=gMode==="teams"?(teamAssign[fid]||"B"):null;
      if(f)await sb.from("tournament_players").insert({tournament_id:t.id,user_id:fid,player_name:f.friend?.full_name||"",player_pid:f.friend?.player_id,team})}
    loadTorneos();openDetail(t)}

  async function openDetail(t){setActiveTorneo(t);
    const{data:pl}=await sb.from("tournament_players").select("*").eq("tournament_id",t.id).order("is_creator",{ascending:false});setPlayers(pl||[]);
    const{data:h}=await sb.from("course_holes").select("*").eq("course_id",t.course_id).order("hole_number");setHoles(h||[]);
    const{data:sc}=await sb.from("tournament_scores").select("*").eq("tournament_id",t.id);
    const sm={};(sc||[]).forEach(s=>{if(!sm[s.player_id])sm[s.player_id]={};sm[s.player_id][s.hole_number]=s.strokes});
    setScores(sm);setView("detail")}

  async function saveScore(playerId,holeNum,strokes){
    const val=parseInt(strokes);if(isNaN(val)||val<1||val>15)return;
    const tp=players.find(x=>x.id===playerId);if(!tp||tp.user_id!==s.user.id)return;
    const hole=holes.find(h=>h.hole_number===holeNum);
    const pts=hole?stablefordPts(val,hole.par):0;
    await sb.from("tournament_scores").upsert({tournament_id:activeTorneo.id,player_id:playerId,user_id:s.user.id,hole_number:holeNum,strokes:val,stableford_points:pts},{onConflict:"tournament_id,player_id,hole_number"});
    setScores(prev=>({...prev,[playerId]:{...(prev[playerId]||{}),[holeNum]:val}}));
    const ps={...(scores[playerId]||{}),[holeNum]:val};
    const total=Object.values(ps).reduce((s,v)=>s+v,0);
    const totalPar=holes.filter(h=>ps[h.hole_number]).reduce((s,h)=>s+h.par,0);
    await sb.from("tournament_players").update({total_score:total,total_vs_par:total-totalPar}).eq("id",playerId)}

  const myPlayerId=players.find(x=>x.user_id===s?.user?.id)?.id;
  const fmtLabel=(f)=>([...FORMATS.individual,...FORMATS.teams].find(x=>x.k===f)?.l||f);

  // ═══ CREATE WIZARD ═══
  if(view==="create")return<div className="fi" style={{padding:16}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}><button onClick={()=>{if(step>1)setStep(step-1);else setView("list")}} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.txt}}>&#8592;</button><h2 style={{margin:0,fontSize:18,fontWeight:700,color:C.txt}}>Crear Torneo</h2><span style={{marginLeft:"auto",fontSize:12,color:C.tm}}>Paso {step}/{gMode==="teams"?5:4}</span></div>
    {/* Step 1: Mode */}
    {step===1&&<><h3 style={{fontSize:15,fontWeight:700,color:C.txt,marginBottom:12}}>Modalidad</h3>
      {Object.entries(MODES).map(([k,m])=><div key={k} onClick={()=>setGMode(k)} style={{padding:18,borderRadius:14,border:"2px solid "+(gMode===k?C.acc:C.bd),background:gMode===k?C.acc+"10":C.cd,cursor:"pointer",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:24}} dangerouslySetInnerHTML={{__html:m.i}}/><div><h4 style={{color:C.txt,fontSize:15,fontWeight:700,margin:0}}>{m.l}</h4><p style={{color:C.ts,fontSize:12,marginTop:2}}>{m.d}</p></div></div>
      </div>)}</>}
    {/* Step 2: Format */}
    {step===2&&<><h3 style={{fontSize:15,fontWeight:700,color:C.txt,marginBottom:12}}>Formato — {MODES[gMode]?.l}</h3>
      {(FORMATS[gMode]||[]).map(f=><div key={f.k} onClick={()=>setGFmt(f.k)} style={{padding:16,borderRadius:14,border:"2px solid "+(gFmt===f.k?C.grn:C.bd),background:gFmt===f.k?C.grn+"10":C.cd,cursor:"pointer",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}} dangerouslySetInnerHTML={{__html:f.i}}/><div><h4 style={{color:C.txt,fontSize:14,fontWeight:700,margin:0}}>{f.l}</h4><p style={{color:C.ts,fontSize:12,marginTop:2}}>{f.d}</p></div></div>
      </div>)}</>}
    {/* Step 3: Name + Course */}
    {step===3&&<><input value={tName} onChange={x=>setTName(x.target.value)} placeholder="Nombre del torneo" style={{...inp0,marginBottom:12}}/>
      <label style={{fontSize:11,color:C.tm,fontWeight:600}}>CAMPO</label>
      <select value={selCourse||""} onChange={x=>setSelCourse(x.target.value)} style={{...inp0,marginTop:4,marginBottom:4,appearance:"auto"}}><option value="">-- Selecciona campo --</option>{courses.map(c=><option key={c.id} value={c.id}>{c.hasBooking?"⭐ ":""}{c.course_name} - {c.city}</option>)}</select>
      {courses.some(c=>c.hasBooking)&&<p style={{fontSize:10,color:C.gld,marginBottom:8}}>⭐ = Campos con reservas activas</p>}
      <div style={{display:"flex",gap:8,marginTop:4}}><div className="sc" style={{flex:1}}><div className="n" style={{fontSize:16,color:C.acc}} dangerouslySetInnerHTML={{__html:MODES[gMode]?.i}}/><div className="l">{MODES[gMode]?.l}</div></div><div className="sc" style={{flex:1}}><div className="n" style={{fontSize:14,color:C.grn}}>{fmtLabel(gFmt)}</div><div className="l">Formato</div></div></div></>}
    {/* Step 4: Players */}
    {step===4&&<><h3 style={{fontSize:15,fontWeight:700,color:C.txt,marginBottom:8}}>Jugadores {gMode==="teams"?"(necesitas # par total)":""}</h3>
      <p style={{fontSize:12,color:C.ts,marginBottom:12}}>Tu + {selFr.length} amigo{selFr.length!==1?"s":""} = {selFr.length+1} total {gMode==="teams"&&(selFr.length+1)%2!==0?<span style={{color:C.acc}}>(necesitas # par para equipos)</span>:""}</p>
      {friends.length===0?<p style={{color:C.tm,fontSize:13}}>Sin amigos. Agrega desde la tab Amigos.</p>:friends.map(f=>{const sel=selFr.includes(f.friend?.id);const dis=selFr.length>=maxPlayers&&!sel;return<div key={f.friend?.id} onClick={()=>{if(dis)return;setSelFr(p=>sel?p.filter(x=>x!==f.friend?.id):[...p,f.friend?.id])}} style={{display:"flex",alignItems:"center",gap:10,background:sel?C.grn+"12":C.bg,border:"1px solid "+(sel?C.grn:C.bd),borderRadius:10,padding:12,marginBottom:6,cursor:dis?"not-allowed":"pointer",opacity:dis?.4:1}}>
        <div style={{width:32,height:32,borderRadius:16,background:sel?C.grn+"30":C.pri,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>{sel?"&#10003;":"&#128100;"}</div>
        <div style={{flex:1}}><div style={{color:C.txt,fontSize:13,fontWeight:600}}>{f.friend?.full_name}</div><div style={{color:C.gld,fontSize:10,fontFamily:"monospace"}}>{f.friend?.player_id}</div></div>
      </div>})}</>}
    {/* Step 5: Team Assignment (only for teams mode) */}
    {step===5&&<><h3 style={{fontSize:15,fontWeight:700,color:C.txt,marginBottom:10}}>Asignar Equipos</h3>
      <p style={{fontSize:12,color:C.ts,marginBottom:12}}>Tu estas en el <b style={{color:C.gld}}>Equipo A</b>. Asigna cada amigo a un equipo.</p>
      {selFr.map(fid=>{const f=friends.find(x=>x.friend?.id===fid);const t=teamAssign[fid]||"";return<div key={fid} style={{display:"flex",alignItems:"center",gap:10,background:C.cd,border:"1px solid "+C.bd,borderRadius:10,padding:12,marginBottom:8}}>
        <div style={{flex:1}}><div style={{color:C.txt,fontSize:13,fontWeight:600}}>{f?.friend?.full_name}</div><div style={{color:C.gld,fontSize:10,fontFamily:"monospace"}}>{f?.friend?.player_id}</div></div>
        <div style={{display:"flex",gap:6}}>{["A","B"].map(team=><button key={team} onClick={()=>setTeamAssign(p=>({...p,[fid]:team}))} style={{padding:"6px 14px",borderRadius:8,border:"2px solid "+(t===team?(team==="A"?C.gld:C.acc):C.bd),background:t===team?(team==="A"?C.gld:C.acc)+"15":"transparent",color:t===team?(team==="A"?C.gld:C.acc):C.tm,fontSize:12,fontWeight:700,cursor:"pointer"}}>Eq {team}</button>)}</div>
      </div>})}
      <div style={{display:"flex",gap:10,marginTop:10}}>
        <div className="sc" style={{flex:1,border:"1px solid "+C.gld+"30"}}><div className="n" style={{color:C.gld,fontSize:16}}>A</div><div className="l">Tu + {Object.values(teamAssign).filter(v=>v==="A").length}</div></div>
        <div className="sc" style={{flex:1,border:"1px solid "+C.acc+"30"}}><div className="n" style={{color:C.acc,fontSize:16}}>B</div><div className="l">{Object.values(teamAssign).filter(v=>v==="B").length} jug</div></div>
      </div></>}
    <button onClick={nextStep} disabled={!canNext()} style={{width:"100%",padding:16,marginTop:16,background:canNext()?`linear-gradient(135deg,${C.acc},#ff6b6b)`:C.cd,color:"#fff",border:"none",borderRadius:14,fontSize:16,fontWeight:700,cursor:"pointer",opacity:canNext()?1:.4}}>{(step===4&&gMode==="individual")||(step===5)?"Crear Torneo":"Siguiente"}</button>
  </div>;

  // ═══ DETAIL + SCORECARD ═══
  if(view==="detail"&&activeTorneo){
    const isTeam=activeTorneo.game_mode==="teams";
    const fmt=activeTorneo.game_format;
    // Leaderboard calculation
    const lb=[...players].map(pl=>{const sc=scores[pl.id]||{};const total=Object.values(sc).reduce((s,v)=>s+v,0);const played=Object.keys(sc).length;
      const playedPar=holes.filter(h=>sc[h.hole_number]).reduce((s,h)=>s+h.par,0);
      const stabPts=fmt==="stableford"?holes.reduce((s,h)=>s+stablefordPts(sc[h.hole_number],h.par),0):0;
      return{...pl,total,played,vsPar:total-playedPar,stabPts}});
    // Sort based on format
    const sorted=fmt==="stableford"?[...lb].sort((a,b)=>b.stabPts-a.stabPts):[...lb].sort((a,b)=>(a.total||999)-(b.total||999));
    // Team totals
    const teamA=isTeam?sorted.filter(p=>p.team==="A"):[];
    const teamB=isTeam?sorted.filter(p=>p.team==="B"):[];
    const teamAScore=fmt==="stableford"?teamA.reduce((s,p)=>s+p.stabPts,0):fmt==="four_ball"?holes.reduce((s,h)=>{const scores_=teamA.map(p=>(scores[p.id]||{})[h.hole_number]).filter(Boolean);return s+(scores_.length?Math.min(...scores_):0)},0):teamA.reduce((s,p)=>s+p.total,0);
    const teamBScore=fmt==="stableford"?teamB.reduce((s,p)=>s+p.stabPts,0):fmt==="four_ball"?holes.reduce((s,h)=>{const scores_=teamB.map(p=>(scores[p.id]||{})[h.hole_number]).filter(Boolean);return s+(scores_.length?Math.min(...scores_):0)},0):teamB.reduce((s,p)=>s+p.total,0);

    return<div className="fi" style={{padding:16,paddingBottom:30}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><button onClick={()=>{setView("list");loadTorneos()}} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.txt}}>&#8592;</button><div style={{flex:1}}><h2 style={{margin:0,fontSize:17,fontWeight:700,color:C.txt}}>{activeTorneo.name}</h2><p style={{fontSize:12,color:C.ts}}>{activeTorneo.course_name}</p></div></div>
      <div style={{display:"flex",gap:8,marginBottom:14}}><span style={{fontSize:11,color:C.gld,background:C.gld+"15",padding:"4px 10px",borderRadius:6,fontWeight:700}}>{MODES[activeTorneo.game_mode]?.l}</span><span style={{fontSize:11,color:C.grn,background:C.grn+"15",padding:"4px 10px",borderRadius:6,fontWeight:700}}>{fmtLabel(activeTorneo.game_format)}</span></div>

      {/* Team scores */}
      {isTeam&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div className="sc" style={{border:"1px solid "+(teamAScore<=(teamBScore||999)?C.gld:C.bd)+"40"}}><div className="n" style={{color:C.gld}}>{fmt==="stableford"?teamAScore+" pts":teamAScore||"--"}</div><div className="l">Equipo A</div></div>
        <div className="sc" style={{border:"1px solid "+(teamBScore<=(teamAScore||999)?C.acc:C.bd)+"40"}}><div className="n" style={{color:C.acc}}>{fmt==="stableford"?teamBScore+" pts":teamBScore||"--"}</div><div className="l">Equipo B</div></div>
      </div>}

      {/* Leaderboard */}
      <h3 style={{fontSize:15,fontWeight:700,color:C.gld,marginBottom:8}}>&#127942; {isTeam?"Jugadores":"Leaderboard"}</h3>
      {sorted.map((pl,i)=>{const sc=scores[pl.id]||{};const isMe=pl.user_id===s?.user?.id;
        return<div key={pl.id} className="ar" style={{borderColor:isMe?C.acc+"40":C.bd}}>
          <div style={{width:28,height:28,borderRadius:14,background:i<3&&!isTeam?[C.gld,"#C0C0C0","#CD7F32"][i]:pl.team==="A"?C.gld+"30":pl.team==="B"?C.acc+"30":C.tm,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:i<3&&!isTeam?"#000":C.txt,flexShrink:0}}>{isTeam?(pl.team||"?"):(i+1)}</div>
          <div style={{flex:1}}><div style={{color:C.txt,fontSize:13,fontWeight:isMe?800:600}}>{pl.player_name}{isMe?" (Tu)":""}</div><div style={{color:C.tm,fontSize:11}}>{pl.player_pid} · {pl.played}/{holes.length}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:15,fontWeight:800,color:pl.total?C.txt:C.tm}}>{fmt==="stableford"?pl.stabPts+" pts":(pl.total||"--")}</div>{fmt!=="stableford"&&pl.total>0&&<div style={{fontSize:10,color:pl.vsPar>0?C.acc:pl.vsPar<0?C.grn:C.ts}}>{pl.vsPar>0?"+":""}{pl.vsPar}</div>}</div>
        </div>})}

      {/* Scorecard */}
      {holes.length>0&&myPlayerId&&<><h3 style={{fontSize:15,fontWeight:700,color:C.txt,marginTop:16,marginBottom:8}}>&#128203; Tu Scorecard</h3>
      <div style={{overflowX:"auto"}}><table className="scorecard"><thead><tr><th>Hoyo</th><th>Par</th><th>Score</th><th>{fmt==="stableford"?"Pts":"+/-"}</th></tr></thead><tbody>
        {holes.map(h=>{const sc=scores[myPlayerId]?.[h.hole_number];const diff=sc?sc-h.par:null;const pts=sc?stablefordPts(sc,h.par):null;
          return<tr key={h.hole_number}><td style={{fontWeight:700}}>{h.hole_number}</td><td>{h.par}</td>
          <td><input type="number" min="1" max="15" value={sc||""} onChange={e=>saveScore(myPlayerId,h.hole_number,e.target.value)} placeholder="-"/></td>
          <td style={{color:fmt==="stableford"?(pts>2?C.grn:pts>0?C.txt:C.acc):(diff>0?C.acc:diff<0?C.grn:C.ts),fontWeight:700}}>{fmt==="stableford"?(pts!=null?pts:"-"):(diff!=null?(diff>0?"+":"")+diff:"-")}</td></tr>})}
        <tr style={{background:C.c2}}><td style={{fontWeight:700}}>Total</td><td style={{fontWeight:700}}>{holes.reduce((s,h)=>s+h.par,0)}</td><td style={{fontWeight:800}}>{Object.values(scores[myPlayerId]||{}).reduce((s,v)=>s+v,0)||"--"}</td>
        <td style={{fontWeight:800}}>{fmt==="stableford"?holes.reduce((s,h)=>s+stablefordPts((scores[myPlayerId]||{})[h.hole_number],h.par),0):""}</td></tr>
      </tbody></table></div></>}
      {holes.length===0&&<p style={{color:C.tm,fontSize:13,marginTop:16}}>&#9971; Este campo no tiene hoyos configurados. El admin del campo puede agregarlos.</p>}
    </div>;
  }

  // ═══ LIST VIEW ═══
  return<div style={{padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><h3 style={{fontSize:18,fontWeight:700,color:C.txt}}>&#127942; Torneos</h3><button onClick={startCreate} style={{padding:"8px 16px",background:`linear-gradient(135deg,${C.acc},#ff6b6b)`,border:"none",borderRadius:10,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Crear</button></div>
    {ld?<div className="pl" style={{textAlign:"center",padding:60,color:C.tm}}>Cargando...</div>:torneos.length===0?<div style={{textAlign:"center",padding:60,color:C.tm}}><div style={{fontSize:40,marginBottom:8}}>&#127942;</div>Sin torneos aun</div>:
    torneos.map(t=><div key={t.id} onClick={()=>openDetail(t)} style={{background:C.cd,borderRadius:14,padding:16,marginBottom:10,border:"1px solid "+C.bd,cursor:"pointer"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><h4 style={{margin:0,fontSize:15,fontWeight:700,color:C.txt}}>{t.name}</h4><span style={{fontSize:10,fontWeight:600,color:t.status==="active"?C.grn:C.tm,background:(t.status==="active"?C.grn:C.tm)+"20",padding:"3px 8px",borderRadius:6}}>{t.status==="active"?"Activo":"Fin"}</span></div>
      <p style={{fontSize:12,color:C.ts}}>&#9971; {t.course_name}</p>
      <div style={{display:"flex",gap:6,marginTop:6}}><span style={{fontSize:10,color:C.gld,background:C.gld+"15",padding:"2px 8px",borderRadius:4}}>{MODES[t.game_mode]?.l||t.game_mode}</span><span style={{fontSize:10,color:C.grn,background:C.grn+"15",padding:"2px 8px",borderRadius:4}}>{fmtLabel(t.game_format)}</span></div>
    </div>)}
  </div>;
}

    <div style={{display:"flex",gap:8,padding:"16px 16px 0"}}>{[{k:"torneos",l:"&#127942; Torneos"},{k:"match",l:"&#129309; Busca Grupo"}].map(t=><button key={t.k} onClick={()=>setVTab(t.k)} style={{flex:1,padding:10,borderRadius:12,border:vTab===t.k?"none":"1px solid "+C.bd,background:vTab===t.k?`linear-gradient(135deg,${C.acc},#ff6b6b)`:C.cd,color:vTab===t.k?"#fff":C.ts,fontSize:13,fontWeight:600,cursor:"pointer"}} dangerouslySetInnerHTML={{__html:t.l}}/>)}</div>

/* ═══════════════════════════════════════════════════
   RANKING SCREEN — Dedicated ranking view
   ═══════════════════════════════════════════════════ */
function RankingScreen({onBack}){
  const{s,p}=useA();
  const[ld,setLd]=useState(true);
  const[national,setNational]=useState([]);
  const[cityRank,setCityRank]=useState([]);
  const[selCity,setSelCity]=useState(p?.city?.trim()||"");
  const[allCities,setAllCities]=useState([]);
  const[coursesPlayed,setCoursesPlayed]=useState([]);
  const[bestCourse,setBestCourse]=useState(null);
  const[recentStats,setRecentStats]=useState(null);
  const[tHistory,setTHistory]=useState([]);const[bestByFmt,setBestByFmt]=useState({});const[selFmt,setSelFmt]=useState("all");const[selTorneo,setSelTorneo]=useState(null);

  useEffect(()=>{if(!s)return;loadAll()},[]);
  async function loadAll(){
    // 1. National ranking — ONLY players (excludes course_admin and any other role)
    const{data:allPlayers}=await sb.from("user_profiles").select("id,full_name,nickname,player_id,points,ranking_position,city").eq("user_role","player").order("points",{ascending:false});
    const natList=(allPlayers||[]).map((u,i)=>({...u,rank:i+1}));
    setNational(natList);

    // Extract unique cities for selector
    const cities=[...new Set(natList.map(u=>u.city?.trim()).filter(Boolean))].sort();
    setAllCities(cities);

    // 2. City ranking — use user's city as default
    const userCity=p?.city?.trim()||"";
    if(userCity)filterCity(natList,userCity);

    // 3. Courses played + best course
    const{data:bks}=await sb.from("bookings").select("course_id,course_name,booking_date,total_cost,party_size,status").eq("user_id",s.user.id).order("booking_date",{ascending:false});
    const allBks=bks||[];
    const byCourse={};
    allBks.forEach(b=>{
      if(!byCourse[b.course_id])byCourse[b.course_id]={name:b.course_name,rounds:0,totalSpent:0,lastPlayed:b.booking_date};
      byCourse[b.course_id].rounds++;
      byCourse[b.course_id].totalSpent+=Number(b.total_cost||0);
      if(b.booking_date>byCourse[b.course_id].lastPlayed)byCourse[b.course_id].lastPlayed=b.booking_date;
    });
    const courseList=Object.entries(byCourse).map(([id,d])=>({id,...d})).sort((a,b)=>b.rounds-a.rounds);
    setCoursesPlayed(courseList);
    if(courseList.length>0)setBestCourse(courseList[0]);

    // 4. Last month performance (sin monto invertido)
    const now=new Date();
    const m30=new Date(now.getTime()-30*24*60*60*1000).toISOString().split("T")[0];
    const m60=new Date(now.getTime()-60*24*60*60*1000).toISOString().split("T")[0];
    const recent=allBks.filter(b=>b.booking_date>=m30);
    const prev=allBks.filter(b=>b.booking_date>=m60&&b.booking_date<m30);
    setRecentStats({rounds:recent.length,prevRounds:prev.length,diff:recent.length-prev.length});

    // 5. Tournament history + best positions by format
    const{data:myTp}=await sb.from("tournament_players").select("*,tournaments(id,name,course_name,game_mode,game_format,status,created_at)").eq("user_id",s.user.id);
    const tList=(myTp||[]).filter(t=>t.tournaments).map(t=>{
      // Calculate position: get all players for this tournament, sort by score
      return{...t,tname:t.tournaments.name,course:t.tournaments.course_name,fmt:t.tournaments.game_format,mode:t.tournaments.game_mode,tid:t.tournaments.id,date:t.tournaments.created_at}
    });
    setTHistory(tList);
    // Load all tournament players for position calculation
    const tids=[...new Set(tList.map(t=>t.tid))];
    if(tids.length>0){
      const{data:allTp}=await sb.from("tournament_players").select("*").in("tournament_id",tids);
      const{data:allTs}=await sb.from("tournament_scores").select("*").in("tournament_id",tids);
      // Calculate positions
      const bestFmt={};
      tList.forEach(t=>{
        const players=(allTp||[]).filter(p=>p.tournament_id===t.tid);
        const scores_=(allTs||[]).filter(s=>s.tournament_id===t.tid);
        // Calc totals per player
        const ranked=players.map(p=>{const ps=scores_.filter(s=>s.player_id===p.id);const total=ps.reduce((s,x)=>s+x.strokes,0);const stabPts=ps.reduce((s,x)=>s+(x.stableford_points||0),0);return{...p,total,stabPts,played:ps.length}});
        const sorted=t.fmt==="stableford"?[...ranked].sort((a,b)=>b.stabPts-a.stabPts):[...ranked].sort((a,b)=>(a.total||999)-(b.total||999));
        const myPos=sorted.findIndex(p=>p.user_id===s.user.id)+1;
        const myEntry={pos:myPos,of:sorted.length,tname:t.tname,course:t.course,fmt:t.fmt,mode:t.mode,tid:t.tid,date:t.date};
        if(!bestFmt[t.fmt]||myPos<bestFmt[t.fmt].pos)bestFmt[t.fmt]=myEntry;
      });
      setBestByFmt(bestFmt);
    }

    setLd(false);
  }

  function filterCity(list,city){
    const filtered=(list||national).filter(u=>u.city&&u.city.trim().toLowerCase()===city.toLowerCase());
    setCityRank(filtered);
  }
  function handleCityChange(city){setSelCity(city);filterCity(national,city)}

  const myNatPos=national.findIndex(u=>u.id===s?.user?.id)+1;
  const myCityPos=cityRank.findIndex(u=>u.id===s?.user?.id)+1;

  if(ld)return<div style={{padding:16}}><button onClick={onBack} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.txt,marginBottom:12}}>&#8592;</button><div className="pl" style={{textAlign:"center",padding:60,color:C.tm}}>Cargando ranking...</div></div>;

  return<div className="fi" style={{padding:16,paddingBottom:30}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}><button onClick={onBack} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.txt}}>&#8592;</button><h2 style={{margin:0,fontSize:19,fontWeight:800,color:C.txt}}>&#127942; Mi Ranking</h2></div>

    {/* a. National + City ranking summary */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      <div className="sc" style={{border:"1px solid "+C.gld+"30"}}><div className="n" style={{color:C.gld}}>#{myNatPos||"--"}</div><div className="l">Nacional</div><div style={{fontSize:9,color:C.tm,marginTop:2}}>de {national.length} jugadores</div></div>

  </div>}


/* ═══ PUSH TOGGLE ═══ */
function PushToggle(){
  const[enabled,setEnabled]=useState(false);const[loading,setLoading]=useState(true);
  useEffect(()=>{
    if(!("Notification" in window)){setLoading(false);return}
    setEnabled(Notification.permission==="granted");setLoading(false)},[]);
  const toggle=async()=>{
    if(enabled){setEnabled(false);return}
    setLoading(true);
    const perm=await Notification.requestPermission();
    setEnabled(perm==="granted");
    if(perm==="granted"){const{s}=sb.auth;const sess=await s.getSession();if(sess.data.session)await initPush(sess.data.session.user.id)}
    setLoading(false)};
  if(!("Notification" in window))return null;
  return<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
    <div><div style={{fontSize:13,fontWeight:600,color:C.txt}}>Notificaciones Push</div><div style={{fontSize:11,color:C.tm}}>Reservas, amigos y torneos</div></div>
    <button onClick={toggle} disabled={loading} style={{width:50,height:28,borderRadius:14,border:"none",background:enabled?C.grn:C.bd,cursor:"pointer",position:"relative",transition:"background .2s"}}>
      <div style={{width:22,height:22,borderRadius:11,background:"#fff",position:"absolute",top:3,left:enabled?25:3,transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.3)"}}/>
    </button>
  </div>}

/* ═══ REVIEW PROMPT ═══ */
function ReviewPrompt({bookingId,courseId,courseName}){
  const{s}=useA();const[done,setDone]=useState(false);const[open,setOpen]=useState(false);
  const[rt,setRt]=useState(0);const[cm,setCm]=useState("");const[busy,setBusy]=useState(false);const[existing,setExisting]=useState(null);
  useEffect(()=>{if(!s||!bookingId)return;sb.from("reviews").select("*").eq("booking_id",bookingId).eq("user_id",s.user.id).single().then(({data})=>{if(data){setExisting(data);setDone(true)}})},[bookingId]);
  const submit=async()=>{if(!rt)return;setBusy(true);
    await sb.from("reviews").upsert({user_id:s.user.id,course_id:courseId,booking_id:bookingId,rating:rt,comment:cm||null},{onConflict:"booking_id"});
    setDone(true);setBusy(false);setOpen(false)};
  if(done)return<div style={{background:C.grn+"15",borderRadius:12,padding:14,marginBottom:14,border:"1px solid "+C.grn+"30"}}>
    <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>&#10003;</span><span style={{fontSize:13,fontWeight:700,color:C.grn}}>Reseña enviada</span><Stars r={existing?.rating||rt} s={12}/></div>
    {(existing?.comment||cm)&&<p style={{fontSize:12,color:C.ts,marginTop:6}}>{existing?.comment||cm}</p>}
  </div>;
  if(!open)return<button onClick={()=>setOpen(true)} style={{width:"100%",padding:14,marginBottom:14,background:`linear-gradient(135deg,${C.gld},#d97706)`,border:"none",borderRadius:12,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>&#9733; Califica tu experiencia</button>;

  </div>}
function AdminBookings({course}){const[bks,setBks]=useState([]);const[ld,setLd]=useState(true);const[selDate,setSelDate]=useState(new Date().toISOString().split("T")[0]);

function AdminProfile({course,onOut,onRefresh}){const{s}=useA();const[ed,setEd]=useState(false);const[sv,setSv]=useState(false);const[desc,setDesc]=useState(course.description||"");const[phone,setPhone]=useState(course.phone_number||"");const[feeMin,setFeeMin]=useState(course.green_fee_min?.toString()||"");const[feeMax,setFeeMax]=useState(course.green_fee_max?.toString()||"");

      <label style={{width:80,height:80,borderRadius:10,border:"2px dashed "+C.bd,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:upPh?"wait":"pointer",flexShrink:0,background:C.cd}}>

/* ═══ SCORECARD DIGITAL & HANDICAP TRACKER ═══ */
function ScorecardScreen({onBack}){
  const{s}=useA();const[cards,setCards]=useState([]);const[ld,setLd]=useState(true);const[create,setCreate]=useState(false);
  const[pastBks,setPastBks]=useState([]);const[selBk,setSelBk]=useState(null);const[holes,setHoles]=useState([]);const[scores,setScores]=useState({});const[saving,setSaving]=useState(false);
  useEffect(()=>{loadCards()},[]);
  async function loadCards(){setLd(true);const{data}=await sb.from("scorecards").select("*").eq("user_id",s.user.id).order("round_date",{ascending:false});setCards(data||[]);setLd(false)}
  async function startCreate(){const td=new Date().toISOString().split("T")[0];const{data}=await sb.from("bookings").select("*").eq("user_id",s.user.id).eq("status","confirmed").lte("booking_date",td).not("course_id","is",null).order("booking_date",{ascending:false}).limit(20);setPastBks(data||[]);setCreate(true)}
  async function pickBooking(b){setSelBk(b);const{data:h}=await sb.from("course_holes").select("*").eq("course_id",b.course_id).order("hole_number");setHoles(h||[]);setScores({})}
  async function saveCard(){if(!selBk||Object.keys(scores).length===0)return;setSaving(true);
    const totalStr=Object.values(scores).reduce((s,v)=>s+v,0);const totalPar=holes.filter(h=>scores[h.hole_number]).reduce((s,h)=>s+h.par,0);
    const playedHoles=Object.keys(scores).length;const courseRating=totalPar*(72/Math.max(totalPar,1));const slopeRating=113;
    const diff=playedHoles>=14?Math.round(((totalStr-courseRating)*113/slopeRating)*10)/10:null;
    const{data:sc}=await sb.from("scorecards").insert({user_id:s.user.id,booking_id:selBk.id,course_id:selBk.course_id,course_name:selBk.course_name,round_date:selBk.booking_date,total_strokes:totalStr,total_par:totalPar,vs_par:totalStr-totalPar,score_differential:diff}).select().single();
    if(sc){const holeData=Object.entries(scores).map(([num,str])=>{const h=holes.find(x=>x.hole_number===parseInt(num));return{scorecard_id:sc.id,hole_number:parseInt(num),par:h?.par||4,strokes:str}});
      if(holeData.length)await sb.from("scorecard_holes").insert(holeData)}
    // Update handicap: avg of best 8 of last 20 differentials
    const{data:recent}=await sb.from("scorecards").select("score_differential").eq("user_id",s.user.id).not("score_differential","is",null).order("round_date",{ascending:false}).limit(20);
    if(recent?.length>=3){const diffs=recent.map(r=>r.score_differential).sort((a,b)=>a-b);const best=diffs.slice(0,Math.max(1,Math.floor(diffs.length*0.4)));const hcp=Math.round(best.reduce((s,d)=>s+d,0)/best.length*10)/10;
      await sb.from("user_profiles").update({handicap:hcp}).eq("id",s.user.id)}
    setSaving(false);setCreate(false);setSelBk(null);loadCards()}
  // Handicap calc
  const handicap=cards.filter(c=>c.score_differential!=null).length>=3?
    (()=>{const d=cards.filter(c=>c.score_differential!=null).map(c=>c.score_differential).sort((a,b)=>a-b);const b=d.slice(0,Math.max(1,Math.floor(d.length*0.4)));return(b.reduce((s,x)=>s+x,0)/b.length).toFixed(1)})():null;

  if(create&&selBk)return<div className="fi" style={{padding:16}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><button onClick={()=>setSelBk(null)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.txt}}>&#8592;</button><h2 style={{margin:0,fontSize:17,fontWeight:700,color:C.txt}}>Scorecard: {selBk.course_name}</h2></div>
    <p style={{fontSize:12,color:C.ts,marginBottom:12}}>{selBk.booking_date}</p>
    {holes.length>0?<div style={{overflowX:"auto"}}><table className="scorecard"><thead><tr><th>Hoyo</th><th>Par</th><th>Score</th><th>+/-</th></tr></thead><tbody>
      {holes.map(h=>{const sc=scores[h.hole_number];const d=sc?sc-h.par:null;return<tr key={h.hole_number}><td style={{fontWeight:700}}>{h.hole_number}</td><td>{h.par}</td>
        <td><input type="number" min="1" max="15" value={sc||""} onChange={e=>{const v=parseInt(e.target.value);if(v>=1&&v<=15)setScores(p=>({...p,[h.hole_number]:v}))}} placeholder="-"/></td>
        <td style={{color:d>0?C.acc:d<0?C.grn:C.ts,fontWeight:700}}>{d!=null?(d>0?"+":"")+d:"-"}</td></tr>})}
      <tr style={{background:C.c2}}><td style={{fontWeight:700}}>Total</td><td>{holes.reduce((s,h)=>s+h.par,0)}</td><td style={{fontWeight:800}}>{Object.values(scores).reduce((s,v)=>s+v,0)||"--"}</td><td></td></tr>
    </tbody></table></div>:<p style={{color:C.tm}}>Este campo no tiene hoyos configurados</p>}
    <button onClick={saveCard} disabled={saving||Object.keys(scores).length===0} style={{width:"100%",padding:14,marginTop:14,background:Object.keys(scores).length?`linear-gradient(135deg,${C.grn},#00cec9)`:C.cd,border:"none",borderRadius:12,color:"#fff",fontWeight:700,cursor:"pointer",opacity:Object.keys(scores).length?1:.4}}>{saving?"Guardando...":"Guardar Scorecard"}</button>
  </div>;

  if(create)return<div className="fi" style={{padding:16}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><button onClick={()=>setCreate(false)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.txt}}>&#8592;</button><h2 style={{margin:0,fontSize:17,fontWeight:700,color:C.txt}}>Selecciona Ronda</h2></div>
    {pastBks.length===0?<p style={{color:C.tm,textAlign:"center",padding:30}}>Sin rondas completadas</p>:pastBks.map(b=><div key={b.id} onClick={()=>pickBooking(b)} style={{background:C.cd,borderRadius:12,padding:14,marginBottom:8,border:"1px solid "+C.bd,cursor:"pointer"}}><div style={{fontSize:14,fontWeight:700,color:C.txt}}>{b.course_name}</div><div style={{fontSize:12,color:C.ts,marginTop:3}}>{b.booking_date} · {b.booking_time?.slice(0,5)}</div></div>)}
  </div>;

  return<div className="fi" style={{padding:16}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><button onClick={onBack} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.txt}}>&#8592;</button><h2 style={{margin:0,fontSize:18,fontWeight:800,color:C.txt}}>&#128203; Scorecard Digital</h2></div>
    {handicap&&<div className="sc" style={{marginBottom:14,border:"1px solid "+C.grn+"30"}}><div className="n" style={{color:C.grn}}>{handicap}</div><div className="l">Handicap WHS</div></div>}
    <button onClick={startCreate} style={{width:"100%",padding:14,marginBottom:14,background:`linear-gradient(135deg,${C.acc},#ff6b6b)`,border:"none",borderRadius:12,color:"#fff",fontWeight:700,cursor:"pointer"}}>+ Nueva Scorecard</button>
    {ld?<div className="pl" style={{textAlign:"center",padding:30,color:C.tm}}>Cargando...</div>:cards.length===0?<div style={{textAlign:"center",padding:30,color:C.tm}}>Sin scorecards registradas</div>:
    cards.map(c=><div key={c.id} className="ar"><div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:C.txt}}>{c.course_name}</div><div style={{fontSize:12,color:C.ts,marginTop:2}}>{c.round_date}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:800,color:C.txt}}>{c.total_strokes}</div><div style={{fontSize:11,color:c.vs_par>0?C.acc:c.vs_par<0?C.grn:C.ts}}>{c.vs_par>0?"+":""}{c.vs_par} ({c.score_differential!=null?"Diff "+c.score_differential:"<14 hoyos"})</div></div></div>)}
  </div>}

/* ═══ MATCHMAKING — BUSCA GRUPO ═══ */
function MatchScreen({onBack,embedded}){
  const{s,p}=useA();const[reqs,setReqs]=useState([]);const[ld,setLd]=useState(true);const[create,setCreate]=useState(false);
  const[courses,setCourses]=useState([]);const[selCourse,setSelCourse]=useState("");const[playDate,setPlayDate]=useState("");const[playTime,setPlayTime]=useState("");const[maxP,setMaxP]=useState(4);const[notes,setNotes]=useState("");
  useEffect(()=>{loadReqs()},[]);
  async function loadReqs(){setLd(true);const{data}=await sb.from("match_requests").select("*,creator:creator_id(full_name,nickname,player_id)").in("status",["open","full"]).order("play_date").order("play_time");setReqs(data||[]);setLd(false)}
  async function startCreate(){const{data}=await sb.from("golf_courses").select("id,course_name,city").eq("status","active").order("course_name");setCourses(data||[]);setCreate(true)}
  async function createReq(){if(!selCourse||!playDate||!playTime)return alert("Completa todos los campos");
    const c=courses.find(x=>x.id===selCourse);
    const{data:mr,error}=await sb.from("match_requests").insert({creator_id:s.user.id,course_id:selCourse,course_name:c?.course_name||"",play_date:playDate,play_time:playTime,max_players:maxP,current_players:1,notes:notes||null}).select().single();
    if(error){alert(error.message);return}
    await sb.from("match_members").insert({match_id:mr.id,user_id:s.user.id});
    setCreate(false);loadReqs()}
  async function joinReq(req){if(req.creator_id===s.user.id)return;
    const{error}=await sb.from("match_members").insert({match_id:req.id,user_id:s.user.id});
    if(error){if(error.code==="23505")alert("Ya estás en este grupo");else alert(error.message);return}
    const newCount=req.current_players+1;const newStatus=newCount>=req.max_players?"full":"open";
    await sb.from("match_requests").update({current_players:newCount,status:newStatus}).eq("id",req.id);
    if(newStatus==="full"){const{data:members}=await sb.from("match_members").select("user_id").eq("match_id",req.id);
      const gf=req.total_cost||0;
      for(const m of (members||[])){await sb.from("bookings").insert({user_id:m.user_id,course_id:req.course_id,course_name:req.course_name,booking_date:req.play_date,booking_time:req.play_time,party_size:1,total_cost:gf,extras_total:0,status:"confirmed"});createNotif(m.user_id,"match_update","Grupo completo","Tu grupo en "+req.course_name+" está completo. Reserva generada para "+req.play_date,{course_name:req.course_name})}}
    loadReqs()}

  if(create)return<div className="fi" style={{padding:16}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><button onClick={()=>setCreate(false)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.txt}}>&#8592;</button><h2 style={{margin:0,fontSize:17,fontWeight:700,color:C.txt}}>Crear Grupo</h2></div>
    <select value={selCourse} onChange={e=>setSelCourse(e.target.value)} style={{...inp0,marginBottom:10,appearance:"auto"}}><option value="">-- Campo --</option>{courses.map(c=><option key={c.id} value={c.id}>{c.course_name} - {c.city}</option>)}</select>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}><div><label style={{fontSize:10,color:C.tm}}>FECHA</label><input type="date" value={playDate} onChange={e=>setPlayDate(e.target.value)} style={{...inp0,marginTop:4}} min={new Date().toISOString().split("T")[0]}/></div><div><label style={{fontSize:10,color:C.tm}}>HORA</label><input type="time" value={playTime} onChange={e=>setPlayTime(e.target.value)} style={{...inp0,marginTop:4}}/></div></div>
    <div style={{marginBottom:10}}><label style={{fontSize:10,color:C.tm}}>JUGADORES MÁX ({maxP})</label><div style={{display:"flex",gap:6,marginTop:4}}>{[2,3,4].map(n=><button key={n} onClick={()=>setMaxP(n)} style={{flex:1,padding:10,borderRadius:10,border:"2px solid "+(maxP===n?C.acc:C.bd),background:maxP===n?C.acc+"15":C.cd,color:maxP===n?C.acc:C.ts,fontWeight:700,cursor:"pointer"}}>{n}</button>)}</div></div>
    <input value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Notas (opcional)" style={{...inp0,marginBottom:14}}/>
    <button onClick={createReq} style={{width:"100%",padding:14,background:`linear-gradient(135deg,${C.acc},#ff6b6b)`,border:"none",borderRadius:12,color:"#fff",fontWeight:700,cursor:"pointer"}}>Publicar</button>
  </div>;

  return<div className="fi" style={{padding:16}}>
    {!embedded&&<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><button onClick={onBack} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.txt}}>&#8592;</button><h2 style={{margin:0,fontSize:18,fontWeight:800,color:C.txt}}>&#129309; Busca Grupo</h2></div>}
    <button onClick={startCreate} style={{width:"100%",padding:14,marginBottom:14,background:`linear-gradient(135deg,${C.acc},#ff6b6b)`,border:"none",borderRadius:12,color:"#fff",fontWeight:700,cursor:"pointer"}}>+ Buscar Grupo</button>
    {ld?<div className="pl" style={{textAlign:"center",padding:30,color:C.tm}}>Cargando...</div>:reqs.length===0?<div style={{textAlign:"center",padding:40,color:C.tm}}>Sin grupos abiertos</div>:

function PremiumInsights({course}){const{s,p}=useA();const{sub,isPremium}=usePremium();const[showPricing,setShowPricing]=useState(false);const[bench,setBench]=useState(null);const[mySt,setMySt]=useState(null);const[ld,setLd]=useState(true);
  useEffect(()=>{loadData()},[]);
  async function loadData(){
    const[bkR,slR,bmR,extR]=await Promise.all([
      sb.from("bookings").select("id,total_cost,booking_date,booking_time,party_size").eq("course_id",course.id).eq("status","confirmed"),
      sb.from("time_slots").select("id,slot_time,slot_date,status,price,booked_count,capacity,course_id").eq("course_name",course.course_name),
      sb.from("market_benchmarks").select("*"),
      sb.from("booking_extras").select("quantity,unit_price,total_price,extras_catalog(name,category)").eq("booking_id",course.id).limit(0)
    ]);
    const bks=bkR.data||[];const slots=slR.data||[];const benchmarks=bmR.data||[];
    // My stats
    const rev=bks.reduce((s,b)=>s+Number(b.total_cost||0),0);
    const avgTicket=bks.length?Math.round(rev/bks.length):0;
    const cap=slots.reduce((s,x)=>s+(x.capacity||0),0);
    const booked=slots.reduce((s,x)=>s+(x.booked_count||0),0);
    const occ=cap?Math.round(booked/cap*100):0;
    // By hour
    const byHour={};slots.forEach(sl=>{const h=parseInt(sl.slot_time?.split(":")[0]||"0");if(!byHour[h])byHour[h]={t:0,b:0,rev:0};byHour[h].t+=sl.capacity||0;byHour[h].b+=sl.booked_count||0});
    bks.forEach(b=>{const h=parseInt(b.booking_time?.split(":")[0]||"0");if(byHour[h])byHour[h].rev+=Number(b.total_cost||0)});
    const hourData=Object.entries(byHour).map(([h,d])=>({hour:parseInt(h),occ:d.t?Math.round(d.b/d.t*100):0,rev:d.rev})).sort((a,b)=>a.hour-b.hour);
    // Benchmark match
    const myBench=benchmarks.find(b=>b.course_type===course.course_type&&b.facility_type===(course.facility_type||"campo"))||benchmarks[0];
    setBench(myBench);setMySt({rev,avgTicket,occ,bks:bks.length,hourData,feeMin:course.green_fee_min,feeMax:course.green_fee_max});setLd(false)}

/* ═══ ADMIN PROMOTIONS ═══ */
function AdminPromos({course}){
  const[promos,setPromos]=useState([]);const[ld,setLd]=useState(true);const[create,setCreate]=useState(false);
  const[pType,setPType]=useState("percent");const[pVal,setPVal]=useState("");const[pFrom,setPFrom]=useState("");const[pUntil,setPUntil]=useState("");const[pTStart,setPTStart]=useState("");const[pTEnd,setPTEnd]=useState("");const[pDesc,setPDesc]=useState("");const[pMin,setPMin]=useState("1");
  useEffect(()=>{load()},[]);
  async function load(){setLd(true);const{data}=await sb.from("promotions").select("*").eq("course_id",course.id).order("created_at",{ascending:false});setPromos(data||[]);setLd(false)}
  async function createPromo(){if(!pVal||!pFrom||!pUntil)return alert("Completa campos obligatorios");
    const PL2={percent:"Descuento %","2x1":"2x1",early_bird:"Early Bird",fixed:"Descuento Fijo"};
    await sb.from("promotions").insert({course_id:course.id,course_name:course.course_name,title:PL2[pType]||pType,promo_type:pType,discount_value:parseFloat(pVal),valid_from:pFrom,valid_until:pUntil,start_date:pFrom,end_date:pUntil,time_start:pTStart||null,time_end:pTEnd||null,min_players:parseInt(pMin)||1,description:pDesc||null,is_active:true});
    setCreate(false);setPVal("");setPDesc("");load()}
  async function togglePromo(id,active){await sb.from("promotions").update({is_active:!active}).eq("id",id);load()}
  const PL={percent:"% Descuento","2x1":"2x1",early_bird:"Early Bird",fixed:"$ Fijo"};

  if(create)return<div className="fi">
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><button onClick={()=>setCreate(false)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.txt}}>&#8592;</button><h2 style={{margin:0,fontSize:17,fontWeight:700,color:C.txt}}>Nueva Promoción</h2></div>
    <div style={{display:"flex",gap:6,marginBottom:12}}>{Object.entries(PL).map(([k,l])=><button key={k} onClick={()=>setPType(k)} style={{flex:1,padding:8,borderRadius:8,border:"2px solid "+(pType===k?C.acc:C.bd),background:pType===k?C.acc+"15":C.cd,color:pType===k?C.acc:C.ts,fontSize:11,fontWeight:700,cursor:"pointer"}}>{l}</button>)}</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
      <div><label style={{fontSize:10,color:C.tm}}>VALOR {pType==="percent"?"%":pType==="fixed"?"$":""}*</label><input value={pVal} onChange={e=>setPVal(e.target.value)} type="number" placeholder={pType==="percent"?"20":"100"} style={{...inp0,marginTop:4}}/></div>
      <div><label style={{fontSize:10,color:C.tm}}>MÍN JUGADORES</label><input value={pMin} onChange={e=>setPMin(e.target.value)} type="number" style={{...inp0,marginTop:4}}/></div>
      <div><label style={{fontSize:10,color:C.tm}}>DESDE *</label><input type="date" value={pFrom} onChange={e=>setPFrom(e.target.value)} style={{...inp0,marginTop:4}}/></div>
      <div><label style={{fontSize:10,color:C.tm}}>HASTA *</label><input type="date" value={pUntil} onChange={e=>setPUntil(e.target.value)} style={{...inp0,marginTop:4}}/></div>
      <div><label style={{fontSize:10,color:C.tm}}>HORA INICIO</label><input type="time" value={pTStart} onChange={e=>setPTStart(e.target.value)} style={{...inp0,marginTop:4}}/></div>
      <div><label style={{fontSize:10,color:C.tm}}>HORA FIN</label><input type="time" value={pTEnd} onChange={e=>setPTEnd(e.target.value)} style={{...inp0,marginTop:4}}/></div>
    </div>
    <input value={pDesc} onChange={e=>setPDesc(e.target.value)} placeholder="Descripción (opcional)" style={{...inp0,marginBottom:14}}/>
    <button onClick={createPromo} style={{width:"100%",padding:14,background:`linear-gradient(135deg,${C.grn},#00cec9)`,border:"none",borderRadius:12,color:"#fff",fontWeight:700,cursor:"pointer"}}>Crear Promoción</button>
  </div>;

  return<div className="fi">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><h3 style={{fontSize:17,fontWeight:700,color:C.txt}}>&#127915; Promociones</h3><button onClick={()=>setCreate(true)} style={{padding:"8px 14px",background:`linear-gradient(135deg,${C.acc},#ff6b6b)`,border:"none",borderRadius:10,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Crear</button></div>
    {ld?<div className="pl" style={{textAlign:"center",padding:30,color:C.tm}}>Cargando...</div>:promos.length===0?<div style={{textAlign:"center",padding:40,color:C.tm}}>Sin promociones</div>:
    promos.map(p=><div key={p.id} className="ar" style={{borderColor:p.is_active?C.grn+"40":C.bd}}>
      <div style={{flex:1}}><div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:13,fontWeight:700,color:C.txt}}>{PL[p.promo_type]}: {p.promo_type==="2x1"?"":p.promo_type==="percent"?p.discount_value+"%":"$"+fm(p.discount_value)}</span><span style={{fontSize:9,color:p.is_active?C.grn:C.tm,background:(p.is_active?C.grn:C.tm)+"20",padding:"2px 6px",borderRadius:4}}>{p.is_active?"Activa":"Inactiva"}</span></div>
        <div style={{fontSize:11,color:C.ts,marginTop:2}}>{p.valid_from} → {p.valid_until}{p.time_start?" · "+p.time_start+"-"+p.time_end:""}</div>
        {p.description&&<div style={{fontSize:11,color:C.tm,marginTop:2}}>{p.description}</div>}</div>
      <button onClick={()=>togglePromo(p.id,p.is_active)} style={{padding:"6px 10px",background:p.is_active?C.acc+"20":C.grn+"20",border:"none",borderRadius:8,color:p.is_active?C.acc:C.grn,fontSize:10,fontWeight:600,cursor:"pointer"}}>{p.is_active?"Desactivar":"Activar"}</button>
    </div>)}
  </div>}

function AdminApp(){const{p,out}=useA();const{theme}=useTheme();const[course,setCourse]=useState(null);const[ld,setLd]=useState(true);const[tab,setTab]=useState(0);

    <div className="bnav">{tabs.map((t,i)=><div key={i} onClick={()=>setTab(i)} style={{background:tab===i?"rgba(0,184,148,0.1)":"transparent",opacity:tab===i?1:.55}}><div style={{fontSize:20}} dangerouslySetInnerHTML={{__html:t.i}}/><div style={{fontSize:10,fontWeight:600,color:tab===i?C.grn:"#8a8f98",marginTop:2}}>{t.l}</div></div>)}</div>
